<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>إدارة المهارات | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="admin-shared.css">
<link rel="stylesheet" href="admin-skills.css">
</head>
<body>
<div id="toast-container"></div>
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
  <a class="navbar-brand logo" href="dashbord.html">TalentHub</a>
  <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu"><span class="navbar-toggler-icon"></span></button>
  <div class="collapse navbar-collapse" id="menu">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="dashbord.html">لوحة التحكم</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-students.html">الطلاب</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-companies.html">الشركات</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-universities.html">الجامعات</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-jobs.html">الوظائف</a></li>
      <li class="nav-item"><a class="nav-link active" href="admin-skills.html">المهارات</a></li>
      <li class="nav-item ms-3"><button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button></li>
    </ul>
  </div>
</div>
</nav>

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>إدارة المهارات</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#skillModal">+ إضافة مهارة</button>
  </div>

  <div class="card-clean mb-4">
    <input type="text" id="searchInput" class="form-control" placeholder="ابحث باسم المهارة أو التصنيف...">
  </div>

  <div class="card-clean" id="tableArea">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>اسم المهارة</th><th>التصنيف</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="4" class="text-center text-muted py-4">جاري التحميل...</td></tr></tbody>
      </table>
    </div>
    <div class="pagination-bar" id="paginationBar"></div>
  </div>
</div>

<div class="modal fade" id="skillModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">إضافة مهارة</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalAlert" class="alert d-none mb-3"></div>
        <div class="mb-3">
          <label class="form-label">اسم المهارة</label>
          <input type="text" class="form-control" id="skillName">
        </div>
        <div class="mb-3">
          <label class="form-label">التصنيف</label>
          <input type="text" class="form-control" id="skillCategory">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
        <button type="button" class="btn btn-primary" id="saveBtn" onclick="saveSkill()">حفظ</button>
      </div>
    </div>
  </div>
</div>

<script src="api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!requireAdmin()) throw new Error("redirect");

let currentPage = 1;
const limit = 10;
let searchQuery = "";
let searchTimer;
let editingId = null;

function statusBadge(status) {
  return status === "ACTIVE" ? "bg-success" : "bg-secondary";
}

function renderTable(items) {
  const tbody = document.getElementById("tbody");
  if (!items || items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">لا توجد مهارات.</td></tr>';
    return;
  }

  tbody.innerHTML = items.map((skill) => `
    <tr>
      <td>${skill.name || "-"}</td>
      <td>${skill.category || "-"}</td>
      <td><span class="badge ${statusBadge(skill.status)}">${arStatus(skill.status)}</span></td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="editSkill('${skill.id}', ${JSON.stringify(skill.name || "")}, ${JSON.stringify(skill.category || "")})">تعديل</button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteSkill('${skill.id}')">حذف</button>
      </td>
    </tr>
  `).join("");
}

function renderPagination(pagination) {
  const bar = document.getElementById("paginationBar");
  if (!pagination || pagination.totalPages <= 1) {
    bar.innerHTML = "";
    return;
  }

  bar.innerHTML = `
    <span>صفحة ${pagination.page} من ${pagination.totalPages} (${pagination.total})</span>
    <button class="btn btn-sm btn-outline-secondary ms-2" onclick="changePage(${pagination.page - 1})" ${pagination.page <= 1 ? "disabled" : ""}>السابق</button>
    <button class="btn btn-sm btn-outline-secondary" onclick="changePage(${pagination.page + 1})" ${pagination.page >= pagination.totalPages ? "disabled" : ""}>التالي</button>
  `;
}

function changePage(page) {
  if (page < 1) return;
  currentPage = page;
  loadData();
}

async function loadData() {
  const area = document.getElementById("tableArea");
  area.classList.add("table-loading");
  try {
    const q = searchQuery ? "&q=" + encodeURIComponent(searchQuery) : "";
    const data = await apiFetch("/skills?page=" + currentPage + "&limit=" + limit + q);
    renderTable(data.items);
    renderPagination(data.pagination);
  } catch (err) {
    showToast(err.message || "فشل التحميل", "error");
  } finally {
    area.classList.remove("table-loading");
  }
}

function editSkill(id, name, category) {
  editingId = id;
  document.getElementById("modalTitle").textContent = "تعديل مهارة";
  document.getElementById("skillName").value = name;
  document.getElementById("skillCategory").value = category;
  new bootstrap.Modal(document.getElementById("skillModal")).show();
}

async function saveSkill() {
  const name = document.getElementById("skillName").value.trim();
  const category = document.getElementById("skillCategory").value.trim();
  const alertBox = document.getElementById("modalAlert");
  const saveBtn = document.getElementById("saveBtn");

  if (!name || !category) {
    alertBox.textContent = "يرجى إدخال جميع الحقول.";
    alertBox.className = "alert alert-danger mb-3";
    return;
  }

  alertBox.className = "alert d-none mb-3";
  saveBtn.disabled = true;
  try {
    if (editingId) {
      await apiFetch("/skills/" + editingId, { method: "PUT", body: JSON.stringify({ name, category }) });
      showToast("تم تحديث المهارة", "success");
    } else {
      await apiFetch("/skills", { method: "POST", body: JSON.stringify({ name, category }) });
      showToast("تمت إضافة المهارة", "success");
    }

    bootstrap.Modal.getInstance(document.getElementById("skillModal")).hide();
    resetModal();
    loadData();
  } catch (err) {
    alertBox.textContent = err.message || "فشل الحفظ";
    alertBox.className = "alert alert-danger mb-3";
  } finally {
    saveBtn.disabled = false;
  }
}

async function deleteSkill(id) {
  if (!confirm("هل تريد حذف هذه المهارة؟")) return;
  try {
    await apiFetch("/skills/" + id, { method: "DELETE" });
    showToast("تم حذف المهارة", "success");
    loadData();
  } catch (err) {
    showToast(err.message || "فشل الحذف", "error");
  }
}

function resetModal() {
  editingId = null;
  document.getElementById("modalTitle").textContent = "إضافة مهارة";
  document.getElementById("skillName").value = "";
  document.getElementById("skillCategory").value = "";
  document.getElementById("modalAlert").className = "alert d-none mb-3";
}

document.getElementById("skillModal").addEventListener("hidden.bs.modal", resetModal);

document.getElementById("searchInput").addEventListener("input", function () {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = this.value.trim();
    currentPage = 1;
    loadData();
  }, 350);
});

loadData();
</script>
<script src="../ui-controls.js"></script>
</body>
</html>
