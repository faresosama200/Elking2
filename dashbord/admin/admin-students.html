<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>إدارة الطلاب | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="admin-shared.css">
<link rel="stylesheet" href="admin-students.css">
</head>
<body>
<div id="toast-container"></div>
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
  <a class="navbar-brand logo" href="dashbord.html">TalentHub</a>
  <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu"><span class="navbar-toggler-icon"></span></button>
  <div class="collapse navbar-collapse" id="menu">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="dashbord.html">لوحة التحكم</a></li>
      <li class="nav-item"><a class="nav-link active" href="admin-students.html">الطلاب</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-companies.html">الشركات</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-universities.html">الجامعات</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-jobs.html">الوظائف</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-skills.html">المهارات</a></li>
      <li class="nav-item ms-3"><button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button></li>
    </ul>
  </div>
</div>
</nav>

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4"><h3>إدارة الطلاب</h3></div>
  <div class="card-clean mb-4">
    <input type="text" id="searchInput" class="form-control" placeholder="ابحث بالبريد أو الاسم أو السيرة الذاتية...">
  </div>

  <div class="card-clean" id="tableArea">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>الاسم</th><th>البريد الإلكتروني</th><th>الجامعة</th><th>المهارات</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="6" class="text-center text-muted py-4">جاري التحميل...</td></tr></tbody>
      </table>
    </div>
    <div class="pagination-bar" id="paginationBar"></div>
  </div>
</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!requireRole('ADMIN')) throw new Error("redirect");

let currentPage = 1;
const limit = 10;
let searchQuery = "";
let searchTimer;

function statusBadge(status) {
  return status === "ACTIVE" ? "bg-success" : status === "PENDING" ? "bg-warning text-dark" : "bg-secondary";
}

function skillsText(student) {
  if (!student.skills || student.skills.length === 0) return "-";
  return student.skills.map((s) => s.skill?.name).filter(Boolean).join("، ");
}

function renderTable(items) {
  const tbody = document.getElementById("tbody");
  if (!items || items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">لا يوجد طلاب.</td></tr>';
    return;
  }

  tbody.innerHTML = items.map((student) => `
    <tr>
      <td>${student.user?.fullName || "-"}</td>
      <td>${student.user?.email || "-"}</td>
      <td>${student.university?.name || "-"}</td>
      <td>${skillsText(student)}</td>
      <td><span class="badge ${statusBadge(student.status)}">${arStatus(student.status)}</span></td>
      <td>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteStudent('${student.id}')">حذف</button>
      </td>
    </tr>
  `).join("");
}

function renderPagination(pagination) {
  const bar = document.getElementById("paginationBar");
  if (!pagination || pagination.totalPages <= 1) {
    bar.innerHTML = "";
    return;
  }

  bar.innerHTML = `
    <span>صفحة ${pagination.page} من ${pagination.totalPages} (${pagination.total})</span>
    <button class="btn btn-sm btn-outline-secondary ms-2" onclick="changePage(${pagination.page - 1})" ${pagination.page <= 1 ? "disabled" : ""}>السابق</button>
    <button class="btn btn-sm btn-outline-secondary" onclick="changePage(${pagination.page + 1})" ${pagination.page >= pagination.totalPages ? "disabled" : ""}>التالي</button>
  `;
}

function changePage(page) {
  if (page < 1) return;
  currentPage = page;
  loadData();
}

async function loadData() {
  const area = document.getElementById("tableArea");
  area.classList.add("table-loading");
  try {
    const q = searchQuery ? "&q=" + encodeURIComponent(searchQuery) : "";
    const data = await apiFetch("/students?page=" + currentPage + "&limit=" + limit + q);
    renderTable(data.items);
    renderPagination(data.pagination);
  } catch (err) {
    showToast(err.message || "فشل التحميل", "error");
  } finally {
    area.classList.remove("table-loading");
  }
}

async function deleteStudent(id) {
  if (!confirm("هل تريد حذف هذا الطالب؟")) return;
  try {
    await apiFetch("/students/" + id, { method: "DELETE" });
    showToast("تم حذف الطالب", "success");
    loadData();
  } catch (err) {
    showToast(err.message || "فشل الحذف", "error");
  }
}

document.getElementById("searchInput").addEventListener("input", function () {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = this.value.trim();
    currentPage = 1;
    loadData();
  }, 350);
});

loadData();
</script>
<script src="../../ui-controls.js"></script>
</body>
</html>
