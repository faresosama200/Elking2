<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentHub API Test Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; padding: 20px; }
        .test-panel { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .test-result { padding: 15px; border-radius: 4px; margin-top: 10px; font-family: monospace; white-space: pre-wrap; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .pending { background: #e2e3e5; color: #383d41; }
        h2 { color: #333; margin-top: 30px; }
        .btn { margin-right: 8px; margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4">🧪 TalentHub API Test Console</h1>
    
    <div class="test-panel">
        <h2>1️⃣ Authentication Tests</h2>
        <button class="btn btn-primary" onclick="testLogin()">Test Login (Admin)</button>
        <button class="btn btn-secondary" onclick="testLoginStudent()">Test Login (Student)</button>
        <button class="btn btn-secondary" onclick="testLogout()">Test Logout</button>
        <button class="btn btn-secondary" onclick="testHealthCheck()">Test Health Check</button>
        <div id="authResult" class="test-result pending d-none"></div>
    </div>

    <div class="test-panel">
        <h2>2️⃣ Dashboard Tests</h2>
        <button class="btn btn-primary" onclick="testDashboard()">Get Dashboard Stats</button>
        <div id="dashResult" class="test-result pending d-none"></div>
    </div>

    <div class="test-panel">
        <h2>3️⃣ Students CRUD</h2>
        <button class="btn btn-primary" onclick="testGetStudents()">Get All Students</button>
        <button class="btn btn-warning" onclick="testAddStudent()">Add Student (Test)</button>
        <button class="btn btn-info" onclick="testGetOneStudent()">Get One Student</button>
        <button class="btn btn-warning" onclick="testUpdateStudent()">Update Student (Test)</button>
        <button class="btn btn-danger" onclick="testDeleteStudent()">Delete Student (Test)</button>
        <div id="studentsResult" class="test-result pending d-none"></div>
    </div>

    <div class="test-panel">
        <h2>4️⃣ Companies CRUD</h2>
        <button class="btn btn-primary" onclick="testGetCompanies()">Get All Companies</button>
        <button class="btn btn-warning" onclick="testAddCompany()">Add Company (Test)</button>
        <div id="companiesResult" class="test-result pending d-none"></div>
    </div>

    <div class="test-panel">
        <h2>5️⃣ Universities CRUD</h2>
        <button class="btn btn-primary" onclick="testGetUniversities()">Get All Universities</button>
        <button class="btn btn-warning" onclick="testAddUniversity()">Add University (Test)</button>
        <div id="universitiesResult" class="test-result pending d-none"></div>
    </div>

    <div class="test-panel">
        <h2>6️⃣ Jobs CRUD</h2>
        <button class="btn btn-primary" onclick="testGetJobs()">Get All Jobs</button>
        <button class="btn btn-warning" onclick="testAddJob()">Add Job (Test)</button>
        <div id="jobsResult" class="test-result pending d-none"></div>
    </div>

    <div class="test-panel">
        <h2>7️⃣ Skills CRUD</h2>
        <button class="btn btn-primary" onclick="testGetSkills()">Get All Skills</button>
        <button class="btn btn-warning" onclick="testAddSkill()">Add Skill (Test)</button>
        <div id="skillsResult" class="test-result pending d-none"></div>
    </div>

    <div class="test-panel">
        <h2>🚀 Quick E2E Flow</h2>
        <button class="btn btn-success btn-lg" onclick="runE2ETest()">Run Full E2E Test</button>
        <div id="e2eResult" class="test-result pending d-none"></div>
    </div>
</div>

<script src="api.js"></script>
<script>
const API_BASE = API; // Use the same API constant from api.js
let currentToken = null;
let currentUserId = null;
let testStudentId = null;
let testCompanyId = null;
let testUniversityId = null;

function showResult(elementId, message, isError = false) {
    const el = document.getElementById(elementId);
    el.textContent = message;
    el.className = "test-result " + (isError ? "error" : "success");
    el.classList.remove("d-none");
}

function showPending(elementId) {
    const el = document.getElementById(elementId);
    el.className = "test-result pending";
    el.classList.remove("d-none");
    el.textContent = "⏳ جاري الاختبار...";
}

async function testHealthCheck() {
    showPending("authResult");
    try {
        const r = await fetch(API_BASE + "/health");
        const data = await r.json();
        showResult("authResult", `✅ Health Check OK\n${JSON.stringify(data, null, 2)}`);
    } catch (e) {
        showResult("authResult", `❌ Error: ${e.message}`, true);
    }
}

async function testLogin() {
    showPending("authResult");
    try {
        const r = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: "admin@talenthub.local",
                password: "Admin1234"
            })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.message || "Login failed");
        
        currentToken = data.accessToken;
        currentUserId = data.user.id;
        localStorage.setItem("th_token", currentToken);
        localStorage.setItem("th_user", JSON.stringify(data.user));
        
        showResult("authResult", `✅ Login Successful\nToken: ${currentToken.substring(0, 20)}...\nUser: ${data.user.fullName} (${data.user.role})\n\n${JSON.stringify(data, null, 2)}`);
    } catch (e) {
        showResult("authResult", `❌ Error: ${e.message}`, true);
    }
}

async function testLoginStudent() {
    showPending("authResult");
    try {
        const r = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                email: "student@example.com",
                password: "password123"
            })
        });
        const data = await r.json();
        showResult("authResult", `Response (may be error if student not found):\n${JSON.stringify(data, null, 2)}`);
    } catch (e) {
        showResult("authResult", `❌ Error: ${e.message}`, true);
    }
}

async function testLogout() {
    showPending("authResult");
    try {
        const r = await fetch(API_BASE + "/auth/logout", {
            method: "POST",
            headers: { "Authorization": `Bearer ${currentToken || ""}` }
        });
        currentToken = null;
        localStorage.removeItem("th_token");
        showResult("authResult", `✅ Logout Successful (Token cleared)`);
    } catch (e) {
        showResult("authResult", `❌ Error: ${e.message}`, true);
    }
}

async function testDashboard() {
    showPending("dashResult");
    try {
        const r = await fetch(API_BASE + "/dashboard", {
            headers: { "Authorization": `Bearer ${currentToken || localStorage.getItem("th_token")}` }
        });
        const data = await r.json();
        showResult("dashResult", `✅ Dashboard Data:\n${JSON.stringify(data, null, 2)}`);
    } catch (e) {
        showResult("dashResult", `❌ Error: ${e.message}`, true);
    }
}

async function testGetStudents() {
    showPending("studentsResult");
    try {
        const r = await fetch(API_BASE + "/students?page=1&limit=5", {
            headers: { "Authorization": `Bearer ${currentToken || localStorage.getItem("th_token")}` }
        });
        const data = await r.json();
        if (data.items && data.items.length > 0) {
            testStudentId = data.items[0].id;
        }
        showResult("studentsResult", `✅ Students List (${data.pagination?.total || 0} total):\n${JSON.stringify(data, null, 2).substring(0, 500)}...`);
    } catch (e) {
        showResult("studentsResult", `❌ Error: ${e.message}`, true);
    }
}

async function testAddStudent() {
    showPending("studentsResult");
    try {
        const r = await fetch(API_BASE + "/students", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${currentToken || localStorage.getItem("th_token")}`
            },
            body: JSON.stringify({
                fullName: "Test Student",
                email: `test${Date.now()}@example.com`,
                universityId: "1",
                cv: "test cv"
            })
        });
        const data = await r.json();
        if (data.id) testStudentId = data.id;
        showResult("studentsResult", `✅ Student Added:\n${JSON.stringify(data, null, 2)}`);
    } catch (e) {
        showResult("studentsResult", `❌ Error: ${e.message}`, true);
    }
}

async function testGetOneStudent() {
    showPending("studentsResult");
    if (!testStudentId) {
        showResult("studentsResult", `⚠️ No student ID. Run "Get All Students" first.`);
        return;
    }
    try {
        const r = await fetch(API_BASE + `/students/${testStudentId}`, {
            headers: { "Authorization": `Bearer ${currentToken || localStorage.getItem("th_token")}` }
        });
        const data = await r.json();
        showResult("studentsResult", `✅ Student Detail:\n${JSON.stringify(data, null, 2)}`);
    } catch (e) {
        showResult("studentsResult", `❌ Error: ${e.message}`, true);
    }
}

async function testUpdateStudent() {
    showPending("studentsResult");
    if (!testStudentId) {
        showResult("studentsResult", `⚠️ No student ID. Run "Get All Students" first.`);
        return;
    }
    try {
        const r = await fetch(API_BASE + `/students/${testStudentId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${currentToken || localStorage.getItem("th_token")}`
            },
            body: JSON.stringify({
                fullName: "Updated Test Student",
                cv: "updated cv content"
            })
        });
        const data = await r.json();
        showResult("studentsResult", `✅ Student Updated:\n${JSON.stringify(data, null, 2)}`);
    } catch (e) {
        showResult("studentsResult", `❌ Error: ${e.message}`, true);
    }
}

async function testDeleteStudent() {
    showPending("studentsResult");
    if (!testStudentId) {
        showResult("studentsResult", `⚠️ No student ID. Run "Get All Students" first.`);
        return;
    }
    try {
        const r = await fetch(API_BASE + `/students/${testStudentId}`, {
            method: "DELETE",
            headers: { "Authorization": `Bearer ${currentToken || localStorage.getItem("th_token")}` }
        });
        const text = await r.text();
        showResult("studentsResult", `✅ Student Deleted (Status: ${r.status})`);
        testStudentId = null;
    } catch (e) {
        showResult("studentsResult", `❌ Error: ${e.message}`, true);
    }
}

        const data = await r.json();
        if (data.items && data.items.length > 0) {
            testCompanyId = data.items[0].id;

        showResult("companiesResult", `✅ Companies (${data.pagination?.total || 0} total):\n${JSON.stringify(data, null, 2).substring(0, 300)}...`);

    showPending("jobsResult");

async function runE2ETest() {
    showPending("e2eResult");
    const steps = [];
    
    try {
        // Step 1: Health check
        steps.push("1️⃣ Health Check...");
        let r = await fetch(API_BASE + "/health");
        if (!r.ok) throw new Error("Health check failed");
        steps.push("   ✅ Health OK");
        
        // Step 2: Login
        steps.push("2️⃣ Admin Login...");
        r = await fetch(API_BASE + "/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: "admin@talenthub.local", password: "Admin1234" })
        });
        const loginData = await r.json();
        if (!r.ok) throw new Error(loginData.message || "Login failed");
        currentToken = loginData.accessToken;
        steps.push("   ✅ Login OK, Token: " + currentToken.substring(0, 20) + "...");
        
        // Step 3: Get Dashboard
        steps.push("3️⃣ Get Dashboard...");
        r = await fetch(API_BASE + "/dashboard", { headers: { "Authorization": `Bearer ${currentToken}` } });
        const dashboard = await r.json();
        if (!r.ok) throw new Error("Dashboard failed");
        steps.push("   ✅ Dashboard loaded");
        steps.push(`      Students: ${dashboard.stats?.students || 0}, Companies: ${dashboard.stats?.companies || 0}`);
        
        // Step 4: Get Students
        steps.push("4️⃣ Get Students...");
        r = await fetch(API_BASE + "/students?page=1&limit=3", { headers: { "Authorization": `Bearer ${currentToken}` } });
        const students = await r.json();
        if (!r.ok) throw new Error("Students failed");
        steps.push(`   ✅ Got ${students.items?.length || 0} students`);
        if (students.items?.length > 0) {
            testStudentId = students.items[0].id;
            steps.push(`      First student: ${students.items[0].user?.fullName}`);
        }
        
        // Step 5: Get Companies
        steps.push("5️⃣ Get Companies...");
        r = await fetch(API_BASE + "/companies?page=1&limit=3", { headers: { "Authorization": `Bearer ${currentToken}` } });
        const companies = await r.json();
        if (!r.ok) throw new Error("Companies failed");
        steps.push(`   ✅ Got ${companies.items?.length || 0} companies`);
        
        // Step 6: Get Universities
        steps.push("6️⃣ Get Universities...");
        r = await fetch(API_BASE + "/universities?page=1&limit=3", { headers: { "Authorization": `Bearer ${currentToken}` } });
        const universities = await r.json();
        if (!r.ok) throw new Error("Universities failed");
        steps.push(`   ✅ Got ${universities.items?.length || 0} universities`);
        
        // Step 7: Get Jobs
        steps.push("7️⃣ Get Jobs...");
        r = await fetch(API_BASE + "/jobs?page=1&limit=3", { headers: { "Authorization": `Bearer ${currentToken}` } });
        const jobs = await r.json();
        if (!r.ok) throw new Error("Jobs failed");
        steps.push(`   ✅ Got ${jobs.items?.length || 0} jobs`);
        
        // Step 8: Get Skills
        steps.push("8️⃣ Get Skills...");
        r = await fetch(API_BASE + "/skills?page=1&limit=5", { headers: { "Authorization": `Bearer ${currentToken}` } });
        const skills = await r.json();
        if (!r.ok) throw new Error("Skills failed");
        steps.push(`   ✅ Got ${skills.items?.length || 0} skills`);
        
        // Step 9: Logout
        steps.push("9️⃣ Logout...");
        r = await fetch(API_BASE + "/auth/logout", { method: "POST", headers: { "Authorization": `Bearer ${currentToken}` } });
        currentToken = null;
        steps.push("   ✅ Logout OK");
        
        steps.push("\n🎉 E2E Test PASSED - All endpoints working!");
        showResult("e2eResult", steps.join("\n"));
        
    } catch (e) {
        steps.push(`\n❌ E2E Test FAILED: ${e.message}`);
        showResult("e2eResult", steps.join("\n"), true);
    }
}
</script>
<script src="../ui-controls.js"></script>
</body>
</html>
