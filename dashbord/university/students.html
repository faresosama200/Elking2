<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>طلاب الجامعة | TalentHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">

<style>
body { background: #f5f6fa; }

.card-clean {
  background: #fff;
  padding: 18px;
  border-radius: 12px;
  text-align: center;
}

.table-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
}

.stat-number {
  font-size: 26px;
  font-weight: bold;
}
</style>

</head>

<body>

<script>
(function(){
  if(!requireAuth()) return;
  if(!requireRole('UNIVERSITY')) return;
}());
</script>

<!--  Navbar -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">

<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link active" href="students.html">الطلاب</a></li>
<li class="nav-item"><a class="nav-link" href="departments.html">الأقسام</a></li>
<li class="nav-item"><a class="nav-link" href="partnerships.html">الشراكات</a></li>
<li class="nav-item"><a class="nav-link" href="university-profile.html">ملفي</a></li>

<li class="nav-item ms-3">
<button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
</li>

</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h4>طلاب الجامعة</h4>
<button class="btn btn-primary btn-sm" onclick="loadStudents()">تحديث</button>
</div>

<!-- 📊 Stats -->
<div class="row g-3 mb-4">

<div class="col-md-4">
<div class="card-clean">
<div>إجمالي الطلاب</div>
<div class="stat-number" id="kpiTotal">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card-clean">
<div>نشط</div>
<div class="stat-number" id="kpiActive">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card-clean">
<div>قيد المراجعة</div>
<div class="stat-number" id="kpiPending">0</div>
</div>
</div>

</div>

<!-- 📋 Table -->
<div class="table-card">

<div class="d-flex justify-content-between align-items-center mb-3">
<h5 class="mb-0">قائمة الطلاب</h5>
<input id="searchInput" class="form-control" style="max-width:250px" placeholder="بحث..." oninput="renderTable()">
</div>

<div class="table-responsive">
<table class="table table-hover align-middle">

<thead>
<tr>
<th>#</th>
<th>الاسم</th>
<th>الإيميل</th>
<th>الحالة</th>
<th>تاريخ الانضمام</th>
</tr>
</thead>

<tbody id="studentsBody">
<tr><td colspan="5" class="text-center text-muted">جاري التحميل...</td></tr>
</tbody>

</table>
</div>

</div>

</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let allStudents = [];

function statusBadge(s){
  if(s === 'ACTIVE') return 'bg-success';
  if(s === 'PENDING') return 'bg-warning text-dark';
  return 'bg-secondary';
}

function renderTable(){
  const q = (searchInput.value || '').toLowerCase();

  const rows = allStudents.filter(s =>
    !q ||
    (s.user?.fullName || '').toLowerCase().includes(q) ||
    (s.user?.email || '').toLowerCase().includes(q)
  );

  if(!rows.length){
    studentsBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">لا يوجد</td></tr>';
    return;
  }

  studentsBody.innerHTML = rows.map((s,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${s.user?.fullName || '-'}</td>
      <td>${s.user?.email || '-'}</td>
      <td><span class="badge ${statusBadge(s.status)}">${arStatus(s.status)}</span></td>
      <td>${s.createdAt ? new Date(s.createdAt).toLocaleDateString('ar-EG') : '-'}</td>
    </tr>
  `).join('');
}

async function loadStudents(){
  studentsBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">جاري التحميل...</td></tr>';

  try{
    let page = 1, totalPages = 1;
    allStudents = [];

    while(page <= totalPages){
      const data = await apiFetch('/students?page='+page+'&limit=50');
      allStudents.push(...(data.items || []));
      totalPages = data.pagination?.totalPages || 1;
      page++;
    }

    kpiTotal.textContent = allStudents.length;
    kpiActive.textContent = allStudents.filter(s=>s.status==='ACTIVE').length;
    kpiPending.textContent = allStudents.filter(s=>s.status==='PENDING').length;

    renderTable();

  }catch(e){
    showToast("فشل تحميل الطلاب","error");
  }
}

loadStudents();
</script>

</body>
</html>
