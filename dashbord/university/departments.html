<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>الأقسام | TalentHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">

<style>
body { background: #f5f6fa; }

.card-clean {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
}

.dept-card {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e5edf5;
  padding: 18px;
  text-align: center;
  transition: 0.2s;
}

.dept-card:hover {
  transform: translateY(-3px);
}

.dept-icon {
  font-size: 30px;
}

.dept-name {
  font-weight: bold;
  margin-top: 10px;
}

.dept-count {
  font-size: 13px;
  color: #777;
}
</style>

</head>

<body>

<script>
(function(){
  if(!requireAuth()) return;
  if(!requireRole('UNIVERSITY')) return;
}());
</script>

<!--  Navbar موحد -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">

<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="students.html">الطلاب</a></li>
<li class="nav-item"><a class="nav-link active" href="departments.html">الأقسام</a></li>
<li class="nav-item"><a class="nav-link" href="partnerships.html">الشراكات</a></li>
<li class="nav-item"><a class="nav-link" href="university-profile.html">ملفي</a></li>

<li class="nav-item ms-3">
<button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
</li>

</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h4>الأقسام والتخصصات</h4>
<button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addDeptModal">
+ إضافة قسم
</button>
</div>

<div class="card-clean mb-4">
📌 إدارة أقسام الجامعة المسجلة على المنصة
</div>

<div id="deptsGrid" class="row g-3">
<div class="text-center text-muted py-4">جاري التحميل...</div>
</div>

</div>

<!-- Modal -->
<div class="modal fade" id="addDeptModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">إضافة قسم</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<input id="deptName" class="form-control mb-2" placeholder="اسم القسم">
<input id="deptSpec" class="form-control mb-2" placeholder="التخصص">
<input id="deptCount" type="number" class="form-control" placeholder="عدد الطلاب">
</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
<button class="btn btn-primary" onclick="addDept()">إضافة</button>
</div>

</div>
</div>
</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const STORE_KEY = 'th_departments_' + (getUser()?.id || 'guest');
const icons = ['🖥️','📐','⚗️','📊','🏗️','🔬','📚','🎨'];

function loadDepts(){
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
  catch { return []; }
}

function saveDepts(list){
  localStorage.setItem(STORE_KEY, JSON.stringify(list));
}

function renderDepts(){
  const list = loadDepts();
  const grid = document.getElementById('deptsGrid');

  if(!list.length){
    grid.innerHTML = '<div class="col-12 text-center text-muted">لا توجد أقسام</div>';
    return;
  }

  grid.innerHTML = list.map((d,i)=>`
    <div class="col-md-4 col-sm-6">
      <div class="dept-card">
        <div class="dept-icon">${icons[i % icons.length]}</div>
        <div class="dept-name">${d.name}</div>
        <div class="dept-count">${d.spec || ''}</div>
        <div class="dept-count">👨‍🎓 ${d.count || 0}</div>

        <button class="btn btn-sm btn-outline-danger mt-2" onclick="removeDept(${i})">
        حذف
        </button>
      </div>
    </div>
  `).join('');
}

function addDept(){
  const name = deptName.value.trim();
  const spec = deptSpec.value.trim();
  const count = parseInt(deptCount.value) || 0;

  if(!name){
    showToast('اكتب اسم القسم','error');
    return;
  }

  const list = loadDepts();
  list.push({name,spec,count});
  saveDepts(list);

  renderDepts();
  bootstrap.Modal.getInstance(addDeptModal).hide();

  deptName.value='';
  deptSpec.value='';
  deptCount.value='';

  showToast('تمت الإضافة','success');
}

function removeDept(i){
  const list = loadDepts();
  list.splice(i,1);
  saveDepts(list);
  renderDepts();
}

renderDepts();
</script>

</body>
</html>
