<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الأقسام | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../ui-styles.css">
<style>
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
.custom-navbar { background: rgba(255,255,255,0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.card-wrap { background: #fff; border-radius: 16px; box-shadow: 0 8px 24px rgba(16,24,40,0.08); }
.dept-card { background: #fff; border-radius: 12px; border: 1px solid #e5edf5; padding: 20px; transition: box-shadow 0.2s; }
.dept-card:hover { box-shadow: 0 4px 16px rgba(102,126,234,0.15); }
.dept-icon { font-size: 32px; margin-bottom: 10px; }
.dept-name { font-weight: 700; color: #102a43; font-size: 16px; }
.dept-count { font-size: 13px; color: #5e7287; margin-top: 4px; }
.btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
</style>
</head>
<body>
<div id="toast-container"></div>
<script src="../../dashbord/api.js"></script>
<script>(function(){ if(!requireAuth()) return; if(!requireRole('UNIVERSITY')) return; }());</script>

<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand" href="dashboard.html"><strong>TalentHub</strong> جامعة</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="navbarMenu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="students.html">الطلاب</a></li>
<li class="nav-item"><a class="nav-link active" href="departments.html">الأقسام</a></li>
<li class="nav-item"><a class="nav-link" href="partnerships.html">الشراكات</a></li>
<li class="nav-item"><a class="nav-link" href="university-profile.html">ملف الجامعة</a></li>
<li class="nav-item"><a class="nav-link" onclick="logout()">تسجيل الخروج</a></li>
</ul>
</div>
</div>
</nav>

<main class="container pt-5 pb-5">
<div class="d-flex justify-content-between align-items-center mb-4">
<div>
  <h3 class="mb-1">الأقسام والتخصصات</h3>
  <p class="text-white-50 mb-0">إدارة أقسام الجامعة المسجلة على المنصة</p>
</div>
<button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#addDeptModal">+ إضافة قسم</button>
</div>

<div class="alert alert-info mb-4" role="alert">
  <strong>ملاحظة:</strong> إدارة الأقسام مرتبطة ببيانات الجامعة المحلية. سيتم مزامنة الأقسام مع المنصة في الإصدار القادم.
</div>

<div id="deptsGrid" class="row g-3 mb-4">
  <div class="col-12 text-center text-white py-4">جاري التحميل...</div>
</div>
</main>

<!-- Modal إضافة قسم -->
<div class="modal fade" id="addDeptModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header"><h5 class="modal-title">إضافة قسم جديد</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
<div class="modal-body">
  <div class="mb-3"><label class="form-label">اسم القسم</label><input id="deptName" class="form-control" placeholder="مثال: قسم الحاسوب"></div>
  <div class="mb-3"><label class="form-label">التخصص</label><input id="deptSpec" class="form-control" placeholder="مثال: هندسة البرمجيات"></div>
  <div class="mb-3"><label class="form-label">عدد الطلاب التقريبي</label><input id="deptCount" class="form-control" type="number" placeholder="0"></div>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
  <button type="button" class="btn btn-primary" onclick="addDept()">إضافة</button>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const STORE_KEY = 'th_departments_' + (getUser()?.id || 'guest');
const icons = ['🖥️','📐','⚗️','📊','🏗️','🔬','📚','🎨','💼','🔧'];

function loadDepts() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch { return []; }
}

function saveDepts(list) {
  localStorage.setItem(STORE_KEY, JSON.stringify(list));
}

function renderDepts() {
  const list = loadDepts();
  const grid = document.getElementById('deptsGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="col-12"><div class="card-wrap p-4 text-center text-muted">لا توجد أقسام مضافة بعد. اضغط "+ إضافة قسم" للبدء.</div></div>';
    return;
  }
  grid.innerHTML = list.map((d, i) => `
    <div class="col-md-4 col-sm-6">
      <div class="dept-card">
        <div class="dept-icon">${icons[i % icons.length]}</div>
        <div class="dept-name">${d.name}</div>
        <div class="dept-count">${d.spec || ''}</div>
        <div class="dept-count mt-1">الطلاب: ${d.count || 0}</div>
        <button class="btn btn-sm btn-outline-danger mt-3" onclick="removeDept(${i})">حذف</button>
      </div>
    </div>
  `).join('');
}

function addDept() {
  const name = document.getElementById('deptName').value.trim();
  const spec = document.getElementById('deptSpec').value.trim();
  const count = parseInt(document.getElementById('deptCount').value) || 0;
  if (!name) { showToast('يرجى إدخال اسم القسم', 'error'); return; }
  const list = loadDepts();
  list.push({ name, spec, count });
  saveDepts(list);
  renderDepts();
  bootstrap.Modal.getInstance(document.getElementById('addDeptModal')).hide();
  document.getElementById('deptName').value = '';
  document.getElementById('deptSpec').value = '';
  document.getElementById('deptCount').value = '';
  showToast('تم إضافة القسم بنجاح');
}

function removeDept(i) {
  const list = loadDepts();
  list.splice(i, 1);
  saveDepts(list);
  renderDepts();
}

renderDepts();
</script>
</body>
</html>
