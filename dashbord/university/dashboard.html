<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard الجامعة | TalentHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">
<script src="../../dashbord/api.js"></script>

<style>
body { background: #f5f6fa; }

.card-clean {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
}

.stat-number {
  font-size: 28px;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<script>
(function () {
  if (!requireAuth()) return;
  if (!requireRole('UNIVERSITY')) return;
}());
</script>

<!--  Navbar موحد -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">

<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link active" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="students.html">الطلاب</a></li>
<li class="nav-item"><a class="nav-link" href="departments.html">الأقسام</a></li>
<li class="nav-item"><a class="nav-link" href="partnerships.html">الشراكات</a></li>
<li class="nav-item"><a class="nav-link" href="university-profile.html">ملفي</a></li>

<li class="nav-item ms-3">
<button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
</li>

</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<h4 class="mb-4">
أهلاً بيك، <span id="universityName">الجامعة</span> 👋
</h4>

<div class="row g-3 mb-4">

<div class="col-md-4">
<div class="card-clean">
<div>الطلاب</div>
<div class="stat-number" id="studentsCount">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card-clean">
<div>الشركات</div>
<div class="stat-number" id="companiesCount">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card-clean">
<div>الوظائف</div>
<div class="stat-number" id="jobsCount">0</div>
</div>
</div>

</div>

<div class="card-clean">
📊 من هنا تقدر تدير الطلاب، الأقسام، والشراكات بسهولة
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadDashboard() {
  const user = getUser();
  universityName.textContent = user.full_name || user.fullName;

  try {
    const stats = await apiFetch("/dashboard");

    studentsCount.textContent = stats.stats.students || 0;
    companiesCount.textContent = stats.stats.companies || 0;
    jobsCount.textContent = stats.stats.jobs || 0;

  } catch (e) {
    showToast("خطأ", "error");
  }
}

loadDashboard();
</script>

</body>
</html>
