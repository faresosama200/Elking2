<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة تحكم الجامعة | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../ui-styles.css">
<script src="../../dashbord/api.js"></script>
<style>
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
.custom-navbar { background: rgba(255,255,255,0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.stat-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.stat-card h4 { color: #667eea; font-weight: 600; font-size: 14px; text-transform: uppercase; }
.stat-card .number { font-size: 32px; font-weight: 700; color: #333; margin: 10px 0; }
.btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
.container { max-width: 1200px; }
</style>
</head>
<body>
<script>
(function () {
  if (!requireAuth()) return;
  if (!requireRole('UNIVERSITY')) return;
}());
</script>

<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand" href="dashboard.html"><strong>TalentHub</strong> جامعة</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarMenu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="students.html">الطلاب</a></li>
<li class="nav-item"><a class="nav-link" href="departments.html">الأقسام</a></li>
<li class="nav-item"><a class="nav-link" href="partnerships.html">الشراكات</a></li>
<li class="nav-item"><a class="nav-link" href="university-profile.html">ملف الجامعة</a></li>
<li class="nav-item"><a class="nav-link" onclick="logout()">تسجيل الخروج</a></li>
</ul>
</div>
</div>
</nav>

<main class="container pt-5 pb-5">
<h1 class="mb-4"><span id="universityName">الجامعة</span>، أهلاً بعودتك! 👋</h1>

<div class="row mb-4">
<div class="col-md-4">
<div class="stat-card">
<h4>الطلاب المسجلين</h4>
<div class="number" id="studentsCount">0</div>
</div>
</div>
<div class="col-md-4">
<div class="stat-card">
<h4>الشركات المتعاونة</h4>
<div class="number" id="companiesCount">0</div>
</div>
</div>
<div class="col-md-4">
<div class="stat-card">
<h4>الوظائف المتاحة</h4>
<div class="number" id="jobsCount">0</div>
</div>
</div>
</div>

<div class="alert alert-info">
<strong>مرحباً بالجامعة!</strong> هنا يمكنك إدارة الطلاب والشراكات مع الشركات.
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadDashboard() {
  const user = getUser();
  document.getElementById("universityName").textContent = user.full_name || user.fullName;

  try {
    const stats = await apiFetch("/dashboard");
    document.getElementById("studentsCount").textContent = stats.stats.students || 0;
    document.getElementById("companiesCount").textContent = stats.stats.companies || 0;
    document.getElementById("jobsCount").textContent = stats.stats.jobs || 0;
  } catch (e) {
    showToast("خطأ: " + e.message, "error");
  }
}

loadDashboard();
</script>
</body>
</html>
