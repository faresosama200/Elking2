<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ملف الجامعة | TalentHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">

<style>
body { background: #f5f6fa; }

.table-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
}
</style>

</head>

<body>

<div id="toast-container"></div>

<script src="../../dashbord/api.js"></script>
<script>
(function(){
  if(!requireAuth()) return;
  if(!requireRole('UNIVERSITY')) return;
}());
</script>

<!--  Navbar -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">

<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="students.html">الطلاب</a></li>
<li class="nav-item"><a class="nav-link" href="departments.html">الأقسام</a></li>
<li class="nav-item"><a class="nav-link" href="partnerships.html">الشراكات</a></li>
<li class="nav-item"><a class="nav-link active" href="university-profile.html">ملفي</a></li>

<li class="nav-item ms-3">
<button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
</li>

</ul>
</div>
</div>
</nav>

<div class="container mt-5">
<div class="row g-4">

<!-- 📄 الفورم -->
<div class="col-md-7">
<div class="table-card">

<h5 class="mb-4">بيانات الجامعة</h5>

<div id="loadingMsg" class="text-center text-muted py-4">
<div class="spinner-border spinner-border-sm me-2"></div> جاري التحميل...
</div>

<div id="profileForm" style="display:none">

<div class="mb-3">
<label class="form-label">الاسم الكامل (المسؤول)</label>
<input id="fullName" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">البريد الإلكتروني</label>
<input id="email" class="form-control" readonly>
</div>

<div class="mb-3">
<label class="form-label">اسم الجامعة</label>
<input id="univName" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">الموقع</label>
<input id="location" class="form-control">
</div>

<div class="mb-4">
<label class="form-label">حالة الحساب</label>
<input id="status" class="form-control" readonly>
</div>

<button class="btn btn-primary w-100" id="saveBtn" onclick="saveProfile()">
حفظ التغييرات
</button>

</div>
</div>
</div>

<!-- 📌 الإرشادات -->
<div class="col-md-5">

<div class="table-card mb-3">
<h6 class="mb-3">إرشادات</h6>
<ul class="mb-0">
<li class="mb-2">تأكد من صحة اسم الجامعة والموقع</li>
<li class="mb-2">راجع حالة الطلاب باستمرار</li>
<li class="mb-2">تابع الشراكات مع الشركات</li>
<li>نظم الأقسام بشكل واضح</li>
</ul>
</div>

<div class="table-card">
<h6 class="mb-3">روابط سريعة</h6>

<div class="d-grid gap-2">
<a href="students.html" class="btn btn-outline-primary">الطلاب</a>
<a href="partnerships.html" class="btn btn-outline-success">الشراكات</a>
<a href="departments.html" class="btn btn-outline-secondary">الأقسام</a>
</div>

</div>

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (!requireRole("UNIVERSITY")) throw new Error("redirect");

async function loadProfile() {
  try {
    const data = await apiFetch("/profile");

    fullName.value = data.fullName || "";
    email.value    = data.email    || "";
    univName.value = data.university ? data.university.name : "";
    location.value = data.university ? data.university.location : "";
    status.value   = arStatus(data.university ? data.university.status : data.status);

    loadingMsg.style.display = "none";
    profileForm.style.display = "";

  } catch (e) {
    loadingMsg.innerHTML = "<div class='text-danger'>فشل تحميل البيانات</div>";
  }
}

async function saveProfile() {
  const btn = saveBtn;
  btn.disabled = true;
  btn.textContent = "جاري الحفظ...";

  try {
    await apiFetch("/profile", {
      method: "PUT",
      body: JSON.stringify({
        fullName: fullName.value.trim(),
        name:     univName.value.trim(),
        location: location.value.trim()
      })
    });

    const u = getUser() || {};
    u.fullName = fullName.value.trim();
    localStorage.setItem("th_user", JSON.stringify(u));

    showToast("تم الحفظ", "success");

  } catch (e) {
    showToast("فشل الحفظ", "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "حفظ التغييرات";
  }
}

loadProfile();
</script>

</body>
</html>
