<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>الشراكات | TalentHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">

<style>
body { background: #f5f6fa; }

.card-clean {
  background: #fff;
  padding: 18px;
  border-radius: 12px;
  text-align: center;
}

.table-card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
}

.stat-number {
  font-size: 26px;
  font-weight: bold;
}
</style>

</head>

<body>

<div id="toast-container"></div>

<script src="../../dashbord/api.js"></script>
<script>
(function(){
  if(!requireAuth()) return;
  if(!requireRole('UNIVERSITY')) return;
}());
</script>

<!--  Navbar -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">

<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="students.html">الطلاب</a></li>
<li class="nav-item"><a class="nav-link" href="departments.html">الأقسام</a></li>
<li class="nav-item"><a class="nav-link active" href="partnerships.html">الشراكات</a></li>
<li class="nav-item"><a class="nav-link" href="university-profile.html">ملفي</a></li>

<li class="nav-item ms-3">
<button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
</li>

</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h4>الشراكات مع الشركات</h4>
<button class="btn btn-primary btn-sm" onclick="loadJobs()">تحديث</button>
</div>

<!-- 📊 Stats -->
<div class="row g-3 mb-4">

<div class="col-md-4">
<div class="card-clean">
<div>إجمالي الوظائف</div>
<div class="stat-number" id="kpiTotal">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card-clean">
<div>وظائف مفتوحة</div>
<div class="stat-number" id="kpiOpen">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card-clean">
<div>شركات مشاركة</div>
<div class="stat-number" id="kpiCompanies">0</div>
</div>
</div>

</div>

<!-- 📋 Table -->
<div class="table-card">

<div class="d-flex justify-content-between align-items-center mb-3">
<h5 class="mb-0">قائمة الوظائف</h5>
<input id="searchInput" class="form-control" style="max-width:250px" placeholder="بحث..." oninput="renderTable()">
</div>

<div class="table-responsive">
<table class="table table-hover align-middle">

<thead>
<tr>
<th>المسمى</th>
<th>الشركة</th>
<th>الموقع</th>
<th>النوع</th>
<th>الحالة</th>
</tr>
</thead>

<tbody id="jobsBody">
<tr><td colspan="5" class="text-center text-muted">جاري التحميل...</td></tr>
</tbody>

</table>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
let allJobs = [];

function statusBadge(s) {
  if (s === 'OPEN') return 'bg-success';
  if (s === 'CLOSED') return 'bg-secondary';
  return 'bg-secondary';
}

function renderTable() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();

  const rows = allJobs.filter(j =>
    !q || ((j.title || '') + ' ' + (j.company?.name || '')).toLowerCase().includes(q)
  );

  if (!rows.length) {
    jobsBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">لا يوجد</td></tr>';
    return;
  }

  jobsBody.innerHTML = rows.map(j => `
    <tr>
      <td>${j.title || '-'}</td>
      <td>${j.company?.name || '-'}</td>
      <td>${j.location || '-'}</td>
      <td>${arJobType(j.type)}</td>
      <td><span class="badge ${statusBadge(j.status)}">${arStatus(j.status)}</span></td>
    </tr>
  `).join('');
}

async function loadJobs() {
  jobsBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">جاري التحميل...</td></tr>';

  try {
    let page = 1, totalPages = 1;
    allJobs = [];

    while (page <= totalPages) {
      const data = await apiFetch('/jobs?page=' + page + '&limit=50');
      allJobs.push(...(data.items || []));
      totalPages = data.pagination?.totalPages || 1;
      page++;
    }

    kpiTotal.textContent = allJobs.length;
    kpiOpen.textContent = allJobs.filter(j => j.status === 'OPEN').length;
    kpiCompanies.textContent = new Set(allJobs.map(j => j.company?.name).filter(Boolean)).size;

    renderTable();

  } catch (e) {
    showToast("فشل تحميل الوظائف","error");
  }
}

loadJobs();
</script>

</body>
</html>
