<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الشراكات | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../ui-styles.css">
<style>
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
.custom-navbar { background: rgba(255,255,255,0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.card-wrap { background: #fff; border-radius: 16px; box-shadow: 0 8px 24px rgba(16,24,40,0.08); }
.kpi-card { background: #fff; border-radius: 14px; border: 1px solid #e5edf5; padding: 16px; }
.kpi-title { font-size: 13px; color: #5e7287; margin-bottom: 6px; }
.kpi-value { font-size: 28px; font-weight: 700; color: #102a43; }
.btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
</style>
</head>
<body>
<div id="toast-container"></div>
<script src="../../dashbord/api.js"></script>
<script>(function(){ if(!requireAuth()) return; if(!requireRole('UNIVERSITY')) return; }());</script>

<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand" href="dashboard.html"><strong>TalentHub</strong> جامعة</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="navbarMenu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="students.html">الطلاب</a></li>
<li class="nav-item"><a class="nav-link" href="departments.html">الأقسام</a></li>
<li class="nav-item"><a class="nav-link active" href="partnerships.html">الشراكات</a></li>
<li class="nav-item"><a class="nav-link" href="university-profile.html">ملف الجامعة</a></li>
<li class="nav-item"><a class="nav-link" onclick="logout()">تسجيل الخروج</a></li>
</ul>
</div>
</div>
</nav>

<main class="container pt-5 pb-5">
<div class="d-flex justify-content-between align-items-center mb-4">
<div>
  <h3 class="mb-1">الشراكات مع الشركات</h3>
  <p class="text-white-50 mb-0">الوظائف الحالية المتاحة على المنصة لتوجيه الطلاب إليها</p>
</div>
<button class="btn btn-light" onclick="loadJobs()">تحديث</button>
</div>

<div class="row g-3 mb-4">
<div class="col-md-4"><div class="kpi-card"><div class="kpi-title">إجمالي الوظائف</div><div id="kpiTotal" class="kpi-value">0</div></div></div>
<div class="col-md-4"><div class="kpi-card"><div class="kpi-title">وظائف مفتوحة</div><div id="kpiOpen" class="kpi-value">0</div></div></div>
<div class="col-md-4"><div class="kpi-card"><div class="kpi-title">شركات مشاركة</div><div id="kpiCompanies" class="kpi-value">0</div></div></div>
</div>

<div class="card-wrap p-3">
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="mb-0">قائمة الوظائف المتاحة</h5>
  <input id="searchInput" class="form-control" style="max-width:260px" placeholder="ابحث بالمسمى أو الشركة..." oninput="renderTable()">
</div>
<div class="table-responsive">
<table class="table table-hover align-middle">
<thead><tr><th>المسمى الوظيفي</th><th>الشركة</th><th>الموقع</th><th>النوع</th><th>الحالة</th></tr></thead>
<tbody id="jobsBody"><tr><td colspan="5" class="text-center text-muted py-4">جاري التحميل...</td></tr></tbody>
</table>
</div>
</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let allJobs = [];

function statusBadge(s) {
  if (s === 'OPEN') return 'bg-success';
  if (s === 'CLOSED') return 'bg-secondary';
  return 'bg-secondary';
}

function renderTable() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const rows = allJobs.filter(j => !q || ((j.title || '') + ' ' + (j.company?.name || '')).toLowerCase().includes(q));
  const body = document.getElementById('jobsBody');
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">لا توجد نتائج.</td></tr>';
    return;
  }
  body.innerHTML = rows.map(j => `<tr>
    <td>${j.title || '-'}</td>
    <td>${j.company?.name || '-'}</td>
    <td>${j.location || '-'}</td>
    <td>${arJobType(j.type)}</td>
    <td><span class="badge ${statusBadge(j.status)}">${arStatus(j.status)}</span></td>
  </tr>`).join('');
}

async function loadJobs() {
  document.getElementById('jobsBody').innerHTML = '<tr><td colspan="5" class="text-center text-muted py-4">جاري التحميل...</td></tr>';
  try {
    let page = 1; const limit = 50; let totalPages = 1; allJobs = [];
    while (page <= totalPages) {
      const data = await apiFetch('/jobs?page=' + page + '&limit=' + limit);
      allJobs.push(...(data.items || []));
      totalPages = data.pagination?.totalPages || 1;
      page++;
    }
    const openJobs = allJobs.filter(j => j.status === 'OPEN').length;
    const companies = new Set(allJobs.map(j => j.company?.name).filter(Boolean)).size;
    document.getElementById('kpiTotal').textContent = allJobs.length;
    document.getElementById('kpiOpen').textContent = openJobs;
    document.getElementById('kpiCompanies').textContent = companies;
    renderTable();
  } catch (e) {
    showToast(e.message || 'فشل تحميل الوظائف', 'error');
    document.getElementById('jobsBody').innerHTML = '<tr><td colspan="5" class="text-center text-danger py-4">فشل التحميل</td></tr>';
  }
}

loadJobs();
</script>
</body>
</html>
