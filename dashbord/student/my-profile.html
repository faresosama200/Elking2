<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ملفي | TalentHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">

<style>
body { background: #f5f6fa; }

.card-clean {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<script>
(function () {
  var token = localStorage.getItem("th_token");
  var user = JSON.parse(localStorage.getItem("th_user") || "null");
  if (!token || !user || user.role !== "STUDENT") {
    window.location.replace("../../login/login.html");
  }
}());
</script>

<!--  Navbar -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="jobs.html">الوظائف</a></li>
<li class="nav-item"><a class="nav-link" href="my-applications.html">طلباتي</a></li>
<li class="nav-item"><a class="nav-link active" href="my-profile.html">ملفي</a></li>

<li class="nav-item ms-3">
<button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
</li>

</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<div class="row g-4">

<!--  البيانات -->
<div class="col-md-5">
<div class="card-clean">

<h5 class="mb-3">بياناتي</h5>

<input id="fullName" class="form-control mb-2" placeholder="الاسم">
<input id="email" class="form-control mb-2" readonly>
<input id="university" class="form-control mb-2" readonly>

<textarea id="bio" class="form-control mb-3" placeholder="نبذة عنك"></textarea>

<button class="btn btn-primary w-100" onclick="saveProfile()">حفظ</button>

</div>
</div>

<!--  المهارات -->
<div class="col-md-7">
<div class="card-clean">

<h5 class="mb-3">مهاراتي (<span id="skillCount">0</span>)</h5>

<div id="mySkillsList" class="d-flex flex-wrap gap-2 mb-3"></div>

<hr>

<input id="skillSearch" class="form-control mb-2" placeholder="ابحث عن مهارة">

<div id="availableSkillsList" class="d-flex flex-wrap gap-2 mb-3"></div>

<hr>

<div class="row g-2">
<div class="col-md-5">
<input id="newSkillName" class="form-control" placeholder="مهارة">
</div>

<div class="col-md-4">
<input id="newSkillCategory" class="form-control" placeholder="تصنيف">
</div>

<div class="col-md-3">
<button class="btn btn-outline-primary w-100" onclick="createSkill()">إضافة</button>
</div>
</div>

<div id="newSkillHint" class="small mt-2"></div>

</div>
</div>

</div>

</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (!requireRole("STUDENT")) throw new Error("redirect");

let mySkillIds = new Set();
let allSkills = [];

async function loadProfile(){
  const p = await apiFetch("/profile");
  fullName.value = p.fullName || "";
  email.value = p.email || "";
  university.value = p.student?.university?.name || "";
  bio.value = p.student?.bio || "";

  const flatSkills = (p.student?.skills || []).map(s => s.skill || s);
  mySkillIds = new Set(flatSkills.map(s => String(s.id)));
  renderMySkills(flatSkills);
}

async function saveProfile(){
  await apiFetch("/profile",{method:"PUT",body:JSON.stringify({
    fullName: fullName.value,
    bio: bio.value
  })});
  showToast("تم الحفظ","success");
}

function renderMySkills(skills){
  skillCount.textContent = skills.length;
  mySkillsList.innerHTML = skills.map(s=>`
    <span class="badge bg-dark">
      ${s.name}
      <button class="btn-close btn-close-white ms-1" onclick="removeSkill('${s.id}','${s.name}')"></button>
    </span>
  `).join("");
}

async function addSkill(id,name){
  await apiFetch("/profile/skills",{method:"POST",body:JSON.stringify({skillId:id})});
  loadProfile();
  loadAllSkills();
}

async function removeSkill(id,name){
  if(!confirm("حذف "+name+"؟")) return;
  await apiFetch("/profile/skills/"+id,{method:"DELETE"});
  loadProfile();
  loadAllSkills();
}

async function createSkill(){
  const name = newSkillName.value.trim();
  const category = newSkillCategory.value.trim() || "أخرى";
  if (!name) { newSkillHint.textContent = "اكتب اسم المهارة"; return; }
  newSkillHint.textContent = "";
  await apiFetch("/profile/skills",{method:"POST",body:JSON.stringify({name, category})});
  newSkillName.value = "";
  newSkillCategory.value = "";
  loadProfile();
  loadAllSkills();
  showToast(name + " تمت إضافتها", "success");
}

function renderAvailableSkills(skills){
  const q = skillSearch.value.trim().toLowerCase();
  availableSkillsList.innerHTML = skills
  .filter(s=>!mySkillIds.has(String(s.id)) && (!q || s.name.toLowerCase().includes(q) || (s.category||'').toLowerCase().includes(q)))
  .map(s=>`<button class="btn btn-sm btn-outline-secondary" onclick="addSkill('${s.id}','${s.name}')">+ ${s.name}</button>`)
  .join("");
}

async function loadAllSkills(){
  const d = await apiFetch("/skills?limit=200");
  allSkills = d.items||[];
  renderAvailableSkills(allSkills);
}

skillSearch.oninput=()=>renderAvailableSkills(allSkills);

loadProfile();
loadAllSkills();
</script>

</body>
</html>
