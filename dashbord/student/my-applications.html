<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>طلباتي | TalentHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">

<style>
body { background: #f5f6fa; }

.card-clean {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<script>
(function () {
  var token = localStorage.getItem("th_token");
  var user = JSON.parse(localStorage.getItem("th_user") || "null");
  if (!token || !user || user.role !== "STUDENT") {
    window.location.replace("../../login/login.html");
  }
}());
</script>

<!-- Navbar  -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="jobs.html">الوظائف</a></li>
<li class="nav-item"><a class="nav-link active" href="my-applications.html">طلباتي</a></li>
<li class="nav-item"><a class="nav-link" href="my-profile.html">ملفي</a></li>

<li class="nav-item ms-3">
<button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
</li>

</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
<h4>طلباتي</h4>

<div class="d-flex gap-2">
<select id="statusFilter" class="form-select">
<option value="">كل الحالات</option>
<option value="PENDING">قيد الانتظار</option>
<option value="REVIEWED">قيد المراجعة</option>
<option value="ACCEPTED">مقبول</option>
<option value="REJECTED">مرفوض</option>
</select>

<select id="pageSize" class="form-select">
<option value="10">10</option>
<option value="20">20</option>
<option value="50">50</option>
</select>
</div>

</div>

<div class="card-clean">

<div class="table-responsive">
<table class="table table-hover align-middle">

<thead>
<tr>
<th>الوظيفة</th>
<th>الشركة</th>
<th>الحالة</th>
<th>التاريخ</th>
<th>الرسالة</th>
<th>الإجراء</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="6" class="text-center text-muted py-4">جاري التحميل...</td></tr>
</tbody>

</table>
</div>

<div id="pager" class="d-flex justify-content-between mt-3"></div>

</div>

</div>

<!-- Modal -->
<div class="modal fade" id="coverLetterModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5>رسالة التقديم</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<p>الوظيفة: <strong id="clJobTitle"></strong></p>
<hr>
<p id="clText"></p>
</div>

</div>
</div>
</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (!requireRole("STUDENT")) throw new Error("redirect");

let currentPage = 1;
let pageLimit = 10;
let modal;

document.addEventListener("DOMContentLoaded", () => {
  modal = new bootstrap.Modal(document.getElementById("coverLetterModal"));
});

function statusBadge(s){
  if(s==="ACCEPTED") return "bg-success";
  if(s==="REJECTED") return "bg-danger";
  if(s==="REVIEWED") return "bg-info text-dark";
  return "bg-warning text-dark";
}

function viewCoverLetter(title,text){
  clJobTitle.textContent=title;
  clText.textContent=text || "لا يوجد";
  modal.show();
}

async function removeApplication(id){
  if(!confirm("حذف الطلب؟")) return;
  await apiFetch("/applications/"+id,{method:"DELETE"});
  loadApplications();
}

async function loadApplications(){
  try{
    let url="/applications?page="+currentPage+"&limit="+pageLimit;
    if(statusFilter.value) url+="&status="+statusFilter.value;

    const data=await apiFetch(url);

    tbody.innerHTML=(data.items||[]).map(a=>{
      return `
      <tr>
      <td><strong>${a.job?.title||"-"}</strong></td>
      <td>${a.job?.companyName||"-"}</td>
      <td><span class="badge ${statusBadge(a.status)}">${arStatus(a.status)}</span></td>
      <td>${a.createdAt||"-"}</td>
      <td>
        ${a.coverLetter ? `<button class="btn btn-sm btn-outline-info" onclick="viewCoverLetter('${a.job?.title}','${a.coverLetter}')">عرض</button>` : "-"}
      </td>
      <td>
        ${a.status==="PENDING" ? `<button class="btn btn-sm btn-outline-danger" onclick="removeApplication('${a.id}')">حذف</button>` : "-"}
      </td>
      </tr>
      `;
    }).join("") || `<tr><td colspan="6" class="text-center">لا يوجد</td></tr>`;

  }catch{
    tbody.innerHTML=`<tr><td colspan="6" class="text-center text-danger">خطأ</td></tr>`;
  }
}

pageSize.onchange=()=>{pageLimit=pageSize.value;loadApplications();}
statusFilter.onchange=()=>{loadApplications();}

loadApplications();
</script>

</body>
</html>
