<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة تحكم الطالب | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../ui-styles.css">
<style>
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
.custom-navbar { background: rgba(255,255,255,0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.stat-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.stat-card h4 { color: #667eea; font-weight: 600; font-size: 14px; text-transform: uppercase; }
.stat-card .number { font-size: 32px; font-weight: 700; color: #333; margin: 10px 0; }
.jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.job-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.job-card h5 { color: #333; margin-bottom: 10px; }
.job-card .job-meta { font-size: 14px; color: #666; margin: 5px 0; }
.btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
.container { max-width: 1200px; }
</style>
</head>
<body>
<script>
(function () {
  var token = localStorage.getItem("th_token");
  var user = JSON.parse(localStorage.getItem("th_user") || "null");
  if (!token || !user || user.role !== "STUDENT") {
    window.location.replace("../../login/login.html");
  }
}());
</script>

<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand" href="dashboard.html"><strong>TalentHub</strong> طالب</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarMenu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="jobs.html">الوظائف</a></li>
<li class="nav-item"><a class="nav-link" href="my-applications.html">طلباتي</a></li>
<li class="nav-item"><a class="nav-link" href="my-profile.html">ملفي</a></li>
<li class="nav-item"><a class="nav-link" onclick="logout()">تسجيل الخروج</a></li>
</ul>
</div>
</div>
</nav>

<main class="container pt-5 pb-5">
<h1 class="mb-4"><span id="userName">الطالب</span>، أهلاً بعودتك! 👋</h1>

<div class="row mb-4">
<div class="col-md-4">
<div class="stat-card">
<h4>طلباتك المعلقة</h4>
<div class="number" id="pendingApps">0</div>
</div>
</div>
<div class="col-md-4">
<div class="stat-card">
<h4>وظائف متاحة</h4>
<div class="number" id="availableJobs">0</div>
</div>
</div>
<div class="col-md-4">
<div class="stat-card">
<h4>إجمالي طلباتك</h4>
<div class="number" id="mySkills">0</div>
</div>
</div>
</div>

<div class="card" style="background: white; border-radius: 12px; margin-bottom: 30px;">
<div class="card-body">
<h5 class="card-title mb-3">الوظائف المتاحة حديثاً</h5>
<div class="jobs-grid" id="jobsContainer">
<p class="text-muted">جاري التحميل...</p>
</div>
</div>
</div>
</main>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadDashboard() {
  if (!requireRole("STUDENT")) return;
  const user = getUser();
  document.getElementById("userName").textContent = user.full_name || user.fullName;

  try {
    const [jobs, pendingApps, allApps] = await Promise.all([
      apiFetch("/jobs?page=1&limit=50"),
      apiFetch("/applications?page=1&limit=1&status=PENDING"),
      apiFetch("/applications?page=1&limit=1")
    ]);

    const openJobs = (jobs.items || []).filter(job => job.status === "OPEN");

    document.getElementById("availableJobs").textContent = openJobs.length;
    document.getElementById("pendingApps").textContent = (pendingApps.pagination?.total ?? 0);
    document.getElementById("mySkills").textContent = (allApps.pagination?.total ?? 0);
    
    const container = document.getElementById("jobsContainer");
    container.innerHTML = "";
    openJobs.slice(0, 6).forEach(job => {
      container.innerHTML += `
        <div class="job-card">
          <h5>${job.title}</h5>
          <p class="job-meta"><strong>${job.company?.name || 'شركة'}</strong></p>
          <p class="job-meta">💰 ${job.salary_range || 'غير محدد'}</p>
          <p class="job-meta">📍 ${job.location || 'غير محدد'}</p>
          <a href="jobs.html" class="btn btn-primary btn-sm mt-2">عرض التفاصيل</a>
        </div>
      `;
    });
  } catch (e) {
    showToast("خطأ: " + e.message, "error");
  }
}

loadDashboard();
</script>
</body>
</html>
