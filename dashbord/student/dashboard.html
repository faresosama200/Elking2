<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة تحكم الطالب | TalentHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">

<style>
body { background: #f5f6fa; }
.card-clean { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
.stat-box { text-align: center; }
.stat-box h6 { color: #888; font-size: 14px; }
.stat-box h3 { font-weight: bold; margin-top: 10px; }
</style>
</head>

<body>

<script>
(function () {
  var token = localStorage.getItem("th_token");
  var user = JSON.parse(localStorage.getItem("th_user") || "null");
  if (!token || !user || user.role !== "STUDENT") {
    window.location.replace("../../login/login.html");
  }
}());
</script>

<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link active" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="jobs.html">الوظائف</a></li>
<li class="nav-item"><a class="nav-link" href="my-applications.html">طلباتي</a></li>
<li class="nav-item"><a class="nav-link" href="my-profile.html">ملفي</a></li>
<li class="nav-item ms-3"><button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button></li>
</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<h3 class="mb-4">مرحباً <span id="userName">...</span> 👋</h3>

<!--  Stats -->
<div class="row mb-4">

<div class="col-md-4">
<div class="card-clean stat-box">
<h6>طلباتك المعلقة</h6>
<h3 id="pendingApps">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card-clean stat-box">
<h6>وظائف متاحة</h6>
<h3 id="availableJobs">0</h3>
</div>
</div>

<div class="col-md-4">
<div class="card-clean stat-box">
<h6>إجمالي طلباتك</h6>
<h3 id="totalApps">0</h3>
</div>
</div>

</div>

<!--  Latest Jobs -->
<div class="card-clean mb-4">
<h5 class="mb-3">أحدث الوظائف</h5>

<div id="jobsContainer">
<p class="text-muted">جاري التحميل...</p>
</div>
</div>

<!--  My Applications -->
<div class="card-clean">
<h5 class="mb-3">طلباتي</h5>

<table class="table table-hover align-middle">
<thead>
<tr>
<th>الوظيفة</th>
<th>الشركة</th>
<th>الحالة</th>
</tr>
</thead>

<tbody id="appsTable">
<tr><td colspan="3" class="text-center text-muted">جاري التحميل...</td></tr>
</tbody>
</table>

</div>

</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadDashboard() {
  if (!requireRole("STUDENT")) return;

  const user = getUser();
  document.getElementById("userName").textContent = user.full_name || user.fullName;

  try {
    const [jobs, pendingApps, allApps, myApps] = await Promise.all([
      apiFetch("/jobs?page=1&limit=6"),
      apiFetch("/applications?page=1&limit=1&status=PENDING"),
      apiFetch("/applications?page=1&limit=1"),
      apiFetch("/applications?page=1&limit=5")
    ]);

    const openJobs = (jobs.items || []).filter(j => j.status === "OPEN");

    document.getElementById("availableJobs").textContent = openJobs.length;
    document.getElementById("pendingApps").textContent = pendingApps.pagination?.total || 0;
    document.getElementById("totalApps").textContent = allApps.pagination?.total || 0;

    // Jobs
    const jobsContainer = document.getElementById("jobsContainer");
    jobsContainer.innerHTML = openJobs.map(job => `
      <div class="mb-3 p-3 border rounded">
        <strong>${job.title}</strong><br>
        <small>${job.company?.name || "-"}</small><br>
        <span class="text-muted">${job.location || ""}</span>
      </div>
    `).join("");

    // Applications
    const appsTable = document.getElementById("appsTable");
    if (!myApps.items || myApps.items.length === 0) {
      appsTable.innerHTML = `<tr><td colspan="3" class="text-center text-muted">لا توجد طلبات</td></tr>`;
    } else {
      appsTable.innerHTML = myApps.items.map(app => `
        <tr>
          <td>${app.job?.title || "-"}</td>
          <td>${app.job?.company?.name || "-"}</td>
          <td><span class="badge bg-warning text-dark">${app.status}</span></td>
        </tr>
      `).join("");
    }

  } catch (err) {
    showToast("فشل تحميل البيانات", "error");
  }
}

loadDashboard();
</script>

</body>
</html>
