<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الوظائف | TalentHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">

<style>
body { background: #f5f6fa; }

.hero-section {
  background: linear-gradient(135deg, #212529 0%, #343a40 100%);
  color: white;
  padding: 30px;
  border-radius: 10px;
  margin-bottom: 25px;
}

.card-clean {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

.category-badge {
  background-color: #e8f2ff;
  color: #0c4a6e;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<script>
(function () {
  var token = localStorage.getItem("th_token");
  var user = JSON.parse(localStorage.getItem("th_user") || "null");
  if (!token || !user || user.role !== "STUDENT") {
    window.location.replace("../../login/login.html");
  }
}());
</script>

<!--  Navbar موحد -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link active" href="jobs.html">الوظائف</a></li>
<li class="nav-item"><a class="nav-link" href="my-applications.html">طلباتي</a></li>
<li class="nav-item"><a class="nav-link" href="my-profile.html">ملفي</a></li>

<li class="nav-item ms-3">
<button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
</li>

</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<!--  Hero -->
<div class="hero-section text-center">
  <h4 class="mb-2">استكشف فرصتك</h4>
  <p class="mb-0">اختار شغلك المناسب وابدأ التقديم دلوقتي</p>
</div>

<!--  Filters -->
<div class="card-clean mb-4">
<div class="row g-3">

<div class="col-md-4">
<input type="text" id="searchInput" class="form-control" placeholder="ابحث عن وظيفة...">
</div>

<div class="col-md-3">
<select id="typeFilter" class="form-select">
<option value="">كل الأنواع</option>
<option value="FULL_TIME">دوام كامل</option>
<option value="PART_TIME">دوام جزئي</option>
<option value="INTERNSHIP">تدريب</option>
</select>
</div>

<div class="col-md-3">
<select id="categoryFilter" class="form-select">
<option value="">كل المجالات</option>
<option value="Web Development">ويب</option>
<option value="Mobile Apps">موبايل</option>
<option value="AI & Data">AI</option>
</select>
</div>

<div class="col-md-2">
<button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Reset</button>
</div>

</div>
</div>

<!-- Table -->
<div class="card-clean">
<div class="table-responsive">
<table class="table table-hover align-middle">

<thead>
<tr>
<th>الوظيفة</th>
<th>الشركة</th>
<th>التخصص</th>
<th>الموقع</th>
<th>النوع</th>
<th>الإجراء</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="6" class="text-center text-muted py-4">جاري التحميل...</td></tr>
</tbody>

</table>
</div>

<div id="pager" class="d-flex justify-content-between mt-3"></div>

</div>

</div>

<!-- Modal -->
<div class="modal fade" id="applyModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5>تقديم</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<p>الوظيفة: <strong id="applyJobTitle"></strong></p>
<textarea id="coverLetterInput" class="form-control" placeholder="اكتب رسالة..."></textarea>
</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
<button class="btn btn-primary" id="confirmApplyBtn">تقديم</button>
</div>

</div>
</div>
</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (!requireRole("STUDENT")) throw new Error("redirect");

let currentPage = 1;
let appliedSet = new Set();
let pendingJobId = null;
let applyModal;

document.addEventListener("DOMContentLoaded", () => {
  applyModal = new bootstrap.Modal(document.getElementById("applyModal"));
});

function resetFilters(){
  searchInput.value="";
  typeFilter.value="";
  categoryFilter.value="";
  loadJobs();
}

function openApplyModal(id,title){
  pendingJobId=id;
  applyJobTitle.textContent=title;
  applyModal.show();
}

async function loadJobs(){
  try{
    const data=await apiFetch("/jobs?page="+currentPage+"&limit=10");
    const items=(data.items||[]).filter(j=>j.status==="OPEN");

    tbody.innerHTML=items.map(j=>{
      return `
      <tr>
      <td><strong>${j.title}</strong></td>
      <td>${j.company?.name||"-"}</td>
      <td><span class="category-badge">${j.category||"عام"}</span></td>
      <td>${j.location||"-"}</td>
      <td><span class="badge bg-secondary">${arJobType(j.type)}</span></td>
      <td><button class="btn btn-sm btn-primary" onclick="openApplyModal('${j.id}','${j.title}')">تقديم</button></td>
      </tr>
      `;
    }).join("");

  }catch{
    tbody.innerHTML=`<tr><td colspan="6" class="text-center text-danger">خطأ</td></tr>`;
  }
}

loadJobs();
</script>

</body>
</html>
