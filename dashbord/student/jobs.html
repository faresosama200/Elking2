<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الوظائف المتاحة | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<script src="../../dashbord/api.js"></script>
</head>
<body class="bg-light">
<script>
(function () {
  var token = localStorage.getItem("th_token");
  var user = JSON.parse(localStorage.getItem("th_user") || "null");
  if (!token || !user || user.role !== "STUDENT") {
    window.location.replace("../../login/login.html");
  }
}());
</script>

<!-- نافبار -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="dashboard.html">TalentHub</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
        <li class="nav-item"><a class="nav-link active" href="jobs.html">الوظائف</a></li>
        <li class="nav-item"><a class="nav-link" href="my-applications.html">طلباتي</a></li>
        <li class="nav-item"><a class="nav-link" href="my-profile.html">ملفي</a></li>
        <li class="nav-item"><a class="nav-link" onclick="logout()" style="cursor:pointer">تسجيل الخروج</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>الوظائف المتاحة</h3>
    <div class="d-flex gap-2 align-items-center">
      <input type="text" id="searchInput" class="form-control" placeholder="ابحث عن وظيفة..." style="max-width:220px">
      <select id="typeFilter" class="form-select" style="max-width:160px">
        <option value="">كل الأنواع</option>
        <option value="FULL_TIME">دوام كامل</option>
        <option value="PART_TIME">دوام جزئي</option>
        <option value="INTERNSHIP">تدريب</option>
      </select>
    </div>
  </div>

  <div class="table-responsive bg-white shadow-sm rounded p-3">
    <table class="table table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>المسمى الوظيفي</th>
          <th>الشركة</th>
          <th>الموقع</th>
          <th>النوع</th>
          <th>الحالة</th>
          <th>الإجراء</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="6" class="text-center text-muted py-4">جاري التحميل...</td></tr></tbody>
    </table>
    <div class="d-flex justify-content-between align-items-center mt-3" id="pager"></div>
  </div>
</div>

<!-- مودال تقديم الطلب -->
<div class="modal fade" id="applyModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">تقديم طلب توظيف</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted mb-3">الوظيفة: <strong id="applyJobTitle">-</strong></p>
        <label for="coverLetterInput" class="form-label fw-semibold">رسالة التغطية (اختياري)</label>
        <textarea id="coverLetterInput" class="form-control" rows="5"
          placeholder="اكتب هنا سبب اهتمامك بهذه الوظيفة وما يميزك عن المتقدمين الآخرين..."></textarea>
        <div class="form-text">يُنصح بكتابة رسالة تغطية لزيادة فرص قبول طلبك.</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
        <button type="button" class="btn btn-primary" id="confirmApplyBtn">تقديم الطلب</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!requireRole("STUDENT")) throw new Error("redirect");

let currentPage = 1;
let pageLimit = 10;
let appliedSet = new Set();
let pendingJobId = null;
let applyModal;

document.addEventListener("DOMContentLoaded", function () {
  applyModal = new bootstrap.Modal(document.getElementById("applyModal"));

  document.getElementById("confirmApplyBtn").addEventListener("click", async function () {
    if (!pendingJobId) return;
    const btn = this;
    btn.disabled = true;
    btn.textContent = "جاري الإرسال...";
    const coverLetter = document.getElementById("coverLetterInput").value.trim();
    try {
      await apiFetch("/applications", {
        method: "POST",
        body: JSON.stringify({ jobId: Number(pendingJobId), coverLetter: coverLetter || undefined })
      });
      applyModal.hide();
      showToast("تم تقديم طلبك بنجاح! ✓", "success");
      await loadJobs();
    } catch (e) {
      showToast(e.message || "فشل تقديم الطلب", "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "تقديم الطلب";
      pendingJobId = null;
    }
  });

  document.getElementById("applyModal").addEventListener("hidden.bs.modal", function () {
    document.getElementById("coverLetterInput").value = "";
    pendingJobId = null;
  });

  document.getElementById("searchInput").addEventListener("input", debounce(function () {
    currentPage = 1;
    loadJobs();
  }, 400));

  document.getElementById("typeFilter").addEventListener("change", function () {
    currentPage = 1;
    loadJobs();
  });
});

function debounce(fn, delay) {
  let t;
  return function () {
    clearTimeout(t);
    t = setTimeout(fn, delay);
  };
}

function openApplyModal(jobId, title) {
  pendingJobId = jobId;
  document.getElementById("applyJobTitle").textContent = title;
  document.getElementById("coverLetterInput").value = "";
  applyModal.show();
}

function renderPager(pagination) {
  const pager = document.getElementById("pager");
  if (!pagination || pagination.totalPages <= 1) { pager.innerHTML = ""; return; }
  pager.innerHTML =
    "<span class='text-muted small'>صفحة " + pagination.page + " من " + pagination.totalPages + " — إجمالي " + pagination.total + " وظيفة</span>" +
    "<div class='d-flex gap-2'>" +
    "<button class='btn btn-sm btn-outline-secondary' " + (pagination.page <= 1 ? "disabled" : "") + " onclick='goPage(" + (pagination.page - 1) + ")'>السابق</button>" +
    "<button class='btn btn-sm btn-outline-secondary' " + (pagination.page >= pagination.totalPages ? "disabled" : "") + " onclick='goPage(" + (pagination.page + 1) + ")'>التالي</button>" +
    "</div>";
}

function goPage(page) {
  if (page < 1) return;
  currentPage = page;
  loadJobs();
}

async function loadJobs() {
  try {
    const apps = await apiFetch("/applications?page=1&limit=200");
    appliedSet = new Set((apps.items || []).map(function (a) { return String(a.job?.id || ""); }));

    const q = document.getElementById("searchInput").value.trim();
    const type = document.getElementById("typeFilter").value;
    let query = "/jobs?page=" + currentPage + "&limit=" + pageLimit;
    if (q) query += "&q=" + encodeURIComponent(q);

    const data = await apiFetch(query);
    let items = data.items || [];
    if (type) items = items.filter(function (j) { return j.type === type; });
    if (!items.length) {
      document.getElementById("tbody").innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">لا توجد وظائف حالياً.</td></tr>';
      renderPager(null);
      return;
    }

    document.getElementById("tbody").innerHTML = items.map(function (j) {
      var jobId = String(j.id || "");
      var isApplied = appliedSet.has(jobId);
      var action = isApplied
        ? '<button class="btn btn-sm btn-outline-success" disabled>✓ تم التقديم</button>'
        : '<button class="btn btn-sm btn-primary" onclick="openApplyModal(' + Number(jobId) + ', \'' + (j.title || '').replace(/'/g, "\\'") + '\')">تقديم</button>';
      return "<tr>" +
        "<td><strong>" + (j.title || "-") + "</strong></td>" +
        "<td>" + (j.company?.name || "-") + "</td>" +
        "<td>" + (j.location || "-") + "</td>" +
        "<td><span class='badge bg-secondary'>" + arJobType(j.type) + "</span></td>" +
        "<td><span class='badge " + (j.status === 'OPEN' ? 'bg-success' : 'bg-danger') + "'>" + arStatus(j.status) + "</span></td>" +
        "<td>" + action + "</td>" +
        "</tr>";
    }).join("");
    renderPager(data.pagination);
  } catch (e) {
    document.getElementById("tbody").innerHTML = '<tr><td colspan="6" class="text-danger text-center py-4">' + (e.message || "خطأ في التحميل") + "</td></tr>";
  }
}

loadJobs();
</script>
</body>
</html>
