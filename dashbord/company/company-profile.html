<div class="container mt-5">

<div class="row g-4">

<!--  بيانات الشركة -->
<div class="col-lg-7">
<div class="card-clean">

<h5 class="section-title">🏢 بيانات الشركة</h5>

<div id="loadingMsg" class="text-center text-muted py-4">
<div class="spinner-border spinner-border-sm"></div>
</div>

<div id="profileForm" style="display:none">

<div class="mb-3">
<label class="form-label">اسم المسؤول</label>
<input id="fullName" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">البريد الإلكتروني</label>
<input id="email" class="form-control" readonly>
</div>

<div class="mb-3">
<label class="form-label">اسم الشركة</label>
<input id="companyName" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">المجال</label>
<input id="industry" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">الحالة</label>
<input id="status" class="form-control" readonly>
</div>

<button class="btn btn-primary w-100" id="saveBtn" onclick="saveProfile()">
حفظ التغييرات
</button>

</div>

</div>
</div>

<!--  النصايح -->
<div class="col-lg-5">

<div class="card-clean">
<h6 class="section-title">💡 نصايح</h6>

<ul class="mb-0">
<li>خلي اسم الشركة واضح</li>
<li>اكتب وصف دقيق للوظائف</li>
<li>راجع الطلبات باستمرار</li>
<li>حدد المهارات المطلوبة</li>
</ul>
</div>

<div class="d-grid gap-2">
<a href="post-job.html" class="btn btn-outline-primary">نشر وظيفة</a>
<a href="my-jobs.html" class="btn btn-outline-secondary">وظائفي</a>
<a href="applications.html" class="btn btn-outline-success">الطلبات</a>
</div>

</div>

</div>

</div>

</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (!requireRole("COMPANY")) throw new Error("redirect");

async function loadProfile() {
  try {
    const data = await apiFetch("/profile");

    fullName.value = data.fullName || "";
    email.value = data.email || "";
    companyName.value = data.company?.name || "";
    industry.value = data.company?.industry || "";
    status.value = arStatus(data.company?.status || data.status);

    loadingMsg.style.display = "none";
    profileForm.style.display = "";

  } catch (e) {
    loadingMsg.innerHTML = "فشل تحميل البيانات";
  }
}

async function saveProfile() {
  const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.textContent = "جاري الحفظ...";

  try {
    await apiFetch("/profile", {
      method: "PUT",
      body: JSON.stringify({
        fullName: fullName.value.trim(),
        name: companyName.value.trim(),
        industry: industry.value.trim()
      })
    });

    showToast("تم الحفظ", "success");

  } catch (e) {
    showToast("فشل الحفظ", "error");
  }

  btn.disabled = false;
  btn.textContent = "حفظ التغييرات";
}

loadProfile();
</script>
