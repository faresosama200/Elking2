<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>طلبات التوظيف | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<script>
(function () {
	var token = localStorage.getItem("th_token");
	var user = JSON.parse(localStorage.getItem("th_user") || "null");
	if (!token || !user || user.role !== "COMPANY") {
		window.location.replace("../../login/login.html");
	}
}());
</script>

<div class="container py-5">
	<div class="d-flex justify-content-between align-items-center mb-4">
		<h3>طلبات التوظيف</h3>
		<div class="d-flex gap-2">
			<select id="pageSize" class="form-select">
				<option value="10" selected>10 لكل صفحة</option>
				<option value="20">20 لكل صفحة</option>
				<option value="50">50 لكل صفحة</option>
			</select>
			<select id="statusFilter" class="form-select">
				<option value="">كل الحالات</option>
				<option value="PENDING">قيد الانتظار</option>
				<option value="REVIEWED">تمت المراجعة</option>
				<option value="ACCEPTED">مقبول</option>
				<option value="REJECTED">مرفوض</option>
			</select>
			<a href="dashboard.html" class="btn btn-outline-secondary">العودة</a>
		</div>
	</div>

	<div class="table-responsive bg-white shadow-sm rounded p-3">
		<table class="table table-hover align-middle">
			<thead>
				<tr>
					<th>الوظيفة</th>
					<th>اسم الطالب</th>
					<th>البريد</th>
					<th>الحالة</th>
					<th>سجل المراجعة</th>
					<th>تغيير الحالة</th>
				</tr>
			</thead>
			<tbody id="tbody"><tr><td colspan="6" class="text-center text-muted">جاري التحميل...</td></tr></tbody>
		</table>
		<div class="d-flex justify-content-between align-items-center mt-3" id="pager"></div>
	</div>
</div>

<div class="modal fade" id="auditModal" tabindex="-1" aria-hidden="true">
	<div class="modal-dialog modal-lg modal-dialog-scrollable">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title">سجل مراجعة الطلب</h5>
				<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
			</div>
			<div class="modal-body">
				<div class="table-responsive">
					<table class="table table-sm align-middle">
						<thead>
							<tr>
								<th>من</th>
								<th>إلى</th>
								<th>بواسطة</th>
								<th>وقت التغيير</th>
							</tr>
						</thead>
						<tbody id="auditBody"><tr><td colspan="4" class="text-center text-muted">اختر طلباً لعرض السجل.</td></tr></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
if (!requireRole("COMPANY")) {
	throw new Error("redirect");
}

let currentPage = 1;
let pageLimit = 10;
let auditModal;

function statusBadgeClass(status) {
	if (status === "ACCEPTED") return "bg-success";
	if (status === "REJECTED") return "bg-danger";
	if (status === "REVIEWED") return "bg-info text-dark";
	return "bg-warning text-dark";
}

function openAudit(id) {
	if (!auditModal) {
		auditModal = new bootstrap.Modal(document.getElementById("auditModal"));
	}
	auditModal.show();
	loadAudit(id);
}

async function loadAudit(id) {
	const body = document.getElementById("auditBody");
	body.innerHTML = '<tr><td colspan="4" class="text-center text-muted">جاري التحميل...</td></tr>';
	try {
		const data = await apiFetch("/applications/" + id + "/history");
		const items = data.items || [];
		if (!items.length) {
			body.innerHTML = '<tr><td colspan="4" class="text-center text-muted">لا يوجد سجل تغييرات بعد.</td></tr>';
			return;
		}

		body.innerHTML = items.map(function (row) {
			const actor = row.changedBy && row.changedBy.fullName
				? row.changedBy.fullName + " (" + arRole(row.changedBy.role || "") + ")"
				: "-";
			const at = row.changedAt ? new Date(row.changedAt).toLocaleString("ar-EG") : "-";
			return "<tr>"
				+ "<td>" + arStatus(row.fromStatus) + "</td>"
				+ "<td>" + arStatus(row.toStatus) + "</td>"
				+ "<td>" + actor + "</td>"
				+ "<td>" + at + "</td>"
				+ "</tr>";
		}).join("");
	} catch (e) {
		body.innerHTML = '<tr><td colspan="4" class="text-center text-danger">' + (e.message || "فشل تحميل السجل") + '</td></tr>';
	}
}

async function setStatus(id, status) {
	try {
		await apiFetch("/applications/" + id, {
			method: "PUT",
			body: JSON.stringify({ status: status })
		});
		showToast("تم تحديث الحالة", "success");
		await loadApplications();
	} catch (e) {
		showToast(e.message || "فشل تحديث الحالة", "error");
	}
}

function renderPager(pagination) {
	const pager = document.getElementById("pager");
	if (!pagination || pagination.totalPages <= 1) {
		pager.innerHTML = "";
		return;
	}

	pager.innerHTML = `
		<span>صفحة ${pagination.page} من ${pagination.totalPages} - إجمالي ${pagination.total} طلب</span>
		<div class="d-flex gap-2">
			<button class="btn btn-sm btn-outline-secondary" ${pagination.page <= 1 ? "disabled" : ""} onclick="goPage(${pagination.page - 1})">السابق</button>
			<button class="btn btn-sm btn-outline-secondary" ${pagination.page >= pagination.totalPages ? "disabled" : ""} onclick="goPage(${pagination.page + 1})">التالي</button>
		</div>
	`;
}

function goPage(page) {
	if (page < 1) return;
	currentPage = page;
	loadApplications();
}

async function loadApplications() {
	try {
		const status = document.getElementById("statusFilter").value;
		const query = status ? ("&status=" + encodeURIComponent(status)) : "";
		const data = await apiFetch("/applications?page=" + currentPage + "&limit=" + pageLimit + query);
		const rows = (data.items || []).map(function (a) {
			return `
				<tr>
					<td>${a.job?.title || "-"}</td>
					<td>${a.student?.fullName || "-"}</td>
					<td>${a.student?.email || "-"}</td>
					<td><span class="badge ${statusBadgeClass(a.status)}">${arStatus(a.status)}</span></td>
					<td><button class="btn btn-sm btn-outline-dark" onclick="openAudit('${a.id}')">عرض السجل</button></td>
					<td class="d-flex gap-1">
						<button class="btn btn-sm btn-outline-info" onclick="setStatus('${a.id}','REVIEWED')">مراجعة</button>
						<button class="btn btn-sm btn-outline-success" onclick="setStatus('${a.id}','ACCEPTED')">قبول</button>
						<button class="btn btn-sm btn-outline-danger" onclick="setStatus('${a.id}','REJECTED')">رفض</button>
					</td>
				</tr>
			`;
		});

		document.getElementById("tbody").innerHTML = rows.length
			? rows.join("")
			: '<tr><td colspan="6" class="text-center text-muted">لا توجد طلبات حالياً</td></tr>';
		renderPager(data.pagination);
	} catch (e) {
		document.getElementById("tbody").innerHTML = '<tr><td colspan="6" class="text-center text-danger">' + (e.message || "فشل التحميل") + '</td></tr>';
		renderPager(null);
	}
}

document.getElementById("statusFilter").addEventListener("change", function () {
	currentPage = 1;
	loadApplications();
});

document.getElementById("pageSize").addEventListener("change", function () {
	pageLimit = Number(this.value) || 10;
	currentPage = 1;
	loadApplications();
});
loadApplications();
</script>
</body>
</html>
