<div class="container mt-5">

<!-- Header -->
<div class="d-flex justify-content-between align-items-center mb-4">
<h4>طلبات التوظيف</h4>

<div class="d-flex gap-2">

<select id="pageSize" class="form-select form-select-sm">
<option value="10">10</option>
<option value="20">20</option>
<option value="50">50</option>
</select>

<select id="statusFilter" class="form-select form-select-sm">
<option value="">كل الحالات</option>
<option value="PENDING">قيد الانتظار</option>
<option value="REVIEWED">مراجعة</option>
<option value="ACCEPTED">مقبول</option>
<option value="REJECTED">مرفوض</option>
</select>

</div>
</div>

<!-- Table -->
<div class="card-clean">

<div class="table-responsive">
<table class="table align-middle">
<thead>
<tr>
<th>الوظيفة</th>
<th>الطالب</th>
<th>الإيميل</th>
<th>الحالة</th>
<th>السجل</th>
<th>تحكم</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="6" class="text-center text-muted">جاري التحميل...</td></tr>
</tbody>
</table>
</div>

<div class="d-flex justify-content-between mt-3" id="pager"></div>

</div>

</div>

<!-- Modal -->
<div class="modal fade" id="auditModal">
<div class="modal-dialog modal-lg">
<div class="modal-content">
<div class="modal-header">
<h5>سجل التغييرات</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<table class="table">
<thead>
<tr>
<th>من</th>
<th>إلى</th>
<th>بواسطة</th>
<th>وقت</th>
</tr>
</thead>

<tbody id="auditBody"></tbody>
</table>
</div>
</div>
</div>
</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (!requireRole("COMPANY")) throw new Error("redirect");

let currentPage = 1;
let pageLimit = 10;
let auditModal;

function statusBadgeClass(status) {
  if (status === "ACCEPTED") return "bg-success";
  if (status === "REJECTED") return "bg-danger";
  if (status === "REVIEWED") return "bg-info text-dark";
  return "bg-warning text-dark";
}

function openAudit(id) {
  if (!auditModal) {
    auditModal = new bootstrap.Modal(document.getElementById("auditModal"));
  }
  auditModal.show();
  loadAudit(id);
}

async function loadAudit(id) {
  const body = document.getElementById("auditBody");
  body.innerHTML = "<tr><td colspan='4'>جاري التحميل...</td></tr>";

  try {
    const data = await apiFetch("/applications/" + id + "/history");
    const items = data.items || [];

    body.innerHTML = items.map(row => `
      <tr>
        <td>${arStatus(row.fromStatus)}</td>
        <td>${arStatus(row.toStatus)}</td>
        <td>${row.changedBy?.fullName || "-"}</td>
        <td>${new Date(row.changedAt).toLocaleString()}</td>
      </tr>
    `).join("");

  } catch (e) {
    body.innerHTML = "<tr><td colspan='4'>خطأ</td></tr>";
  }
}

async function setStatus(id, status) {
  try {
    await apiFetch("/applications/" + id, {
      method: "PUT",
      body: JSON.stringify({ status })
    });

    showToast("تم التحديث", "success");
    loadApplications();

  } catch (e) {
    showToast("فشل", "error");
  }
}

async function loadApplications() {
  const status = document.getElementById("statusFilter").value;
  const data = await apiFetch(`/applications?page=${currentPage}&limit=${pageLimit}&status=${status}`);

  const rows = (data.items || []).map(a => `
<tr>
<td>${a.job?.title || "-"}</td>
<td>${a.student?.fullName || "-"}</td>
<td>${a.student?.email || "-"}</td>
<td><span class="badge ${statusBadgeClass(a.status)}">${arStatus(a.status)}</span></td>
<td><button class="btn btn-sm btn-dark" onclick="openAudit('${a.id}')">عرض</button></td>
<td class="d-flex gap-1">
<button class="btn btn-sm btn-info" onclick="setStatus('${a.id}','REVIEWED')">مراجعة</button>
<button class="btn btn-sm btn-success" onclick="setStatus('${a.id}','ACCEPTED')">قبول</button>
<button class="btn btn-sm btn-danger" onclick="setStatus('${a.id}','REJECTED')">رفض</button>
</td>
</tr>
`);

  document.getElementById("tbody").innerHTML = rows.join("");
}

document.getElementById("statusFilter").onchange = () => {
  currentPage = 1;
  loadApplications();
};

document.getElementById("pageSize").onchange = function () {
  pageLimit = this.value;
  loadApplications();
};

loadApplications();
</script>

</body>
</html>
