  background: #fff;
  padding: 20px;
  border-radius: 12px;

.preview-card {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
}

.preview-chip {
  background: #eef2ff;
  padding: 5px 10px;
  border-radius: 8px;
  font-size: 12px;
}

.btn-primary {
  background: #6366f1;
  border: none;
}
</style>

<div class="container mt-5">

<h4 class="mb-4">🧾 نشر وظيفة جديدة</h4>

<div class="row g-4">

<!--  الفورم -->
<div class="col-lg-7">
<div class="card-clean">

<form id="jobForm" novalidate>

<div class="mb-3">
<label class="form-label">المسمى الوظيفي</label>
<input class="form-control" id="title" required>
</div>

<div class="row g-3 mb-3">
<div class="col-md-4">
<label class="form-label">الموقع</label>
<input class="form-control" id="location" value="Remote" required>
</div>

<div class="col-md-4">
<label class="form-label">النوع</label>
<select class="form-select" id="type">
<option value="FULL_TIME">دوام كامل</option>
<option value="PART_TIME">دوام جزئي</option>
<option value="INTERNSHIP">تدريب</option>
</select>
</div>

<div class="col-md-4">
<label class="form-label">التخصص</label>
<select class="form-select" id="category">
<option value="Web Development">Web</option>
<option value="Mobile Apps">Mobile</option>
<option value="Desktop Apps">Desktop</option>
<option value="Cyber Security">Security</option>
<option value="AI & Data">AI</option>
</select>
</div>
</div>

<div class="mb-3">
<label class="form-label">الوصف</label>
<textarea class="form-control" id="description" rows="5"></textarea>
</div>

<button class="btn btn-primary w-100" id="submitBtn">نشر الوظيفة</button>

</form>

</div>
</div>

<!--  المعاينة -->
<div class="col-lg-5">
<div class="preview-card">

<h5 id="previewTitle">عنوان الوظيفة</h5>

<div class="d-flex gap-2 mb-3">
<span class="preview-chip" id="previewType">دوام كامل</span>
<span class="preview-chip" id="previewLocation">Remote</span>
<span class="preview-chip" id="previewCategory">Web</span>
</div>

<p id="previewDescription" class="text-muted">وصف الوظيفة</p>

</div>
</div>

</div>

</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (!requireRole("COMPANY")) throw new Error("redirect");

const titleInput = document.getElementById("title");
const locationInput = document.getElementById("location");
const typeInput = document.getElementById("type");
const categoryInput = document.getElementById("category");
const descriptionInput = document.getElementById("description");

function updatePreview() {
  previewTitle.textContent = titleInput.value || "عنوان الوظيفة";
  previewLocation.textContent = locationInput.value || "Remote";
  previewType.textContent = arJobType(typeInput.value);
  previewCategory.textContent = categoryInput.value;
  previewDescription.textContent = descriptionInput.value || "وصف الوظيفة";
}

titleInput.oninput = updatePreview;
locationInput.oninput = updatePreview;
typeInput.onchange = updatePreview;
categoryInput.onchange = updatePreview;
descriptionInput.oninput = updatePreview;

document.getElementById("jobForm").addEventListener("submit", async function(e){
  e.preventDefault();

  try {
    await apiFetch("/jobs", {
      method: "POST",
      body: JSON.stringify({
        title: titleInput.value,
        location: locationInput.value,
        type: typeInput.value,
        category: categoryInput.value,
        description: descriptionInput.value
      })
    });

    showToast("تم النشر بنجاح", "success");
    window.location.href = "my-jobs.html";

  } catch(err) {
    showToast(err.message, "error");
  }
});

updatePreview();
</script>

</body>
