<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة تحكم الشركة | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../ui-styles.css">
<style>
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
.custom-navbar { background: rgba(255,255,255,0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.stat-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.stat-card h4 { color: #667eea; font-weight: 600; font-size: 14px; text-transform: uppercase; }
.stat-card .number { font-size: 32px; font-weight: 700; color: #333; margin: 10px 0; }
.btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
.container { max-width: 1200px; }
</style>
</head>
<body>
<script>
(function () {
  var token = localStorage.getItem("th_token");
  var user = JSON.parse(localStorage.getItem("th_user") || "null");
  if (!token || !user || user.role !== "COMPANY") {
    window.location.replace("../../login/login.html");
  }
}());
</script>

<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand" href="dashboard.html"><strong>TalentHub</strong> شركة</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarMenu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="post-job.html">نشر وظيفة</a></li>
<li class="nav-item"><a class="nav-link" href="my-jobs.html">وظائفي</a></li>
<li class="nav-item"><a class="nav-link" href="applications.html">الطلبات</a></li>
<li class="nav-item"><a class="nav-link" href="company-profile.html">ملف الشركة</a></li>
<li class="nav-item"><a class="nav-link" onclick="logout()">تسجيل الخروج</a></li>
</ul>
</div>
</div>
</nav>

<main class="container pt-5 pb-5">
<h1 class="mb-4"><span id="companyName">الشركة</span>، أهلاً بعودتك! 👋</h1>

<div class="row mb-4">
<div class="col-md-4">
<div class="stat-card">
<h4>وظائفك المنشورة</h4>
<div class="number" id="jobsCount">0</div>
</div>
</div>
<div class="col-md-4">
<div class="stat-card">
<h4>طلبات التوظيف</h4>
<div class="number" id="applicationsCount">0</div>
</div>
</div>
<div class="col-md-4">
<div class="stat-card">
<h4>الطلاب المقبولين</h4>
<div class="number" id="hiredCount">0</div>
</div>
</div>
</div>

<div class="alert alert-info">
<strong>مرحباً بالشركة!</strong> هنا يمكنك نشر الوظائف وإدارة طلبات الموظفين.
</div>
</main>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadDashboard() {
  if (!requireRole("COMPANY")) return;
  const user = getUser();
  document.getElementById("companyName").textContent = user.full_name || user.fullName;

  try {
    const [myJobs, allApps, acceptedApps] = await Promise.all([
      apiFetch("/jobs?mine=1&page=1&limit=1"),
      apiFetch("/applications?page=1&limit=1"),
      apiFetch("/applications?page=1&limit=1&status=ACCEPTED")
    ]);

    document.getElementById("jobsCount").textContent = myJobs.pagination?.total ?? 0;
    document.getElementById("applicationsCount").textContent = allApps.pagination?.total ?? 0;
    document.getElementById("hiredCount").textContent = acceptedApps.pagination?.total ?? 0;
  } catch (e) {
    showToast("خطأ: " + e.message, "error");
  }
}

loadDashboard();
</script>
</body>
</html>
