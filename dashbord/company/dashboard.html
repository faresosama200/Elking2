<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="../../dashbord/admin-shared.css">

<style>
body { background: #f5f6fa; }

.card-clean {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.stat-number {
  font-size: 28px;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<script>
(function () {
  var token = localStorage.getItem("th_token");
  var user = JSON.parse(localStorage.getItem("th_user") || "null");
  if (!token || !user || user.role !== "COMPANY") {
    window.location.replace("../../login/login.html");
  }
}());
</script>

<!--  Navbar  -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
<a class="navbar-brand logo" href="dashboard.html">TalentHub</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link active" href="dashboard.html">الرئيسية</a></li>
<li class="nav-item"><a class="nav-link" href="post-job.html">نشر وظيفة</a></li>
<li class="nav-item"><a class="nav-link" href="my-jobs.html">وظائفي</a></li>
<li class="nav-item"><a class="nav-link" href="applications.html">الطلبات</a></li>
<li class="nav-item"><a class="nav-link" href="company-profile.html">ملفي</a></li>

<li class="nav-item ms-3">
<button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button>
</li>

</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<h4 class="mb-4">
أهلاً بيك، <span id="companyName">الشركة</span> 👋
</h4>

<div class="row g-3 mb-4">

<div class="col-md-4">
<div class="card-clean">
<div>وظائفك</div>
<div class="stat-number" id="jobsCount">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card-clean">
<div>الطلبات</div>
<div class="stat-number" id="applicationsCount">0</div>
</div>
</div>

<div class="col-md-4">
<div class="card-clean">
<div>تم قبولهم</div>
<div class="stat-number" id="hiredCount">0</div>
</div>
</div>

</div>

<div class="card-clean">
📊 من هنا تقدر تتابع الوظائف والطلبات وتدير عملية التوظيف بسهولة
</div>

</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadDashboard(){
  if(!requireRole("COMPANY")) return;

  const user = getUser();
  companyName.textContent = user.full_name || user.fullName;

  try{
    const [jobs, apps, accepted] = await Promise.all([
      apiFetch("/jobs?mine=1&page=1&limit=1"),
      apiFetch("/applications?page=1&limit=1"),
      apiFetch("/applications?page=1&limit=1&status=ACCEPTED")
    ]);

    jobsCount.textContent = jobs.pagination?.total || 0;
    applicationsCount.textContent = apps.pagination?.total || 0;
    hiredCount.textContent = accepted.pagination?.total || 0;

  }catch(e){
    showToast("خطأ", "error");
  }
}

loadDashboard();
</script>

</body>
</html>
