.card-clean {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

.status-chip {
  min-width: 80px;
}
</style>
</head>

<body>

  if (!token || !user || user.role !== "COMPANY") {
    window.location.replace("../../login/login.html");
  }

<!--  Navbar -->
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="dashboard.html">الرئيسية</a></li>

<div class="container mt-5">

<!-- Header -->
<div class="d-flex justify-content-between align-items-center mb-4">
<h4>وظائفك المنشورة</h4>

<div class="d-flex gap-2">

<input id="searchInput" class="form-control form-control-sm" placeholder="ابحث...">

<select id="statusFilter" class="form-select form-select-sm">
<option value="">كل الحالات</option>
<option value="OPEN">مفتوحة</option>
<option value="CLOSED">مغلقة</option>
</select>

<a href="post-job.html" class="btn btn-primary btn-sm">+ وظيفة</a>

</div>
</div>

<!-- Table -->
<div class="card-clean">

<div class="table-responsive">
<table class="table align-middle">
<thead>
<tr>
<th>المسمى</th>
<th>الموقع</th>
<th>النوع</th>
<th>الحالة</th>
<th>الوصف</th>
<th>تحكم</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="6" class="text-center text-muted">جاري التحميل...</td></tr>
</tbody>
</table>
</div>

<div class="d-flex justify-content-between mt-3" id="pager"></div>

</div>

</div>

<script src="../../dashbord/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
if (!requireRole("COMPANY")) throw new Error("redirect");

let currentPage = 1;
const pageLimit = 10;
let searchQuery = "";
let statusFilter = "";
let timer;

function statusBadgeClass(status) {
  return status === "OPEN" ? "bg-success" : "bg-secondary";
}

function shorten(text) {
  return text && text.length > 80 ? text.slice(0, 80) + "..." : (text || "-");
}

async function toggleStatus(id, current) {
  const next = current === "OPEN" ? "CLOSED" : "OPEN";
  await apiFetch("/jobs/" + id, {
    method: "PUT",
    body: JSON.stringify({ status: next })
  });
  showToast("تم التحديث", "success");
  loadJobs();
}

async function deleteJob(id) {
  if (!confirm("حذف الوظيفة؟")) return;
  await apiFetch("/jobs/" + id, { method: "DELETE" });
  showToast("تم الحذف", "success");
  loadJobs();
}

async function loadJobs() {
  const q = searchQuery ? "&q=" + encodeURIComponent(searchQuery) : "";
  const data = await apiFetch(`/jobs?mine=1&page=${currentPage}&limit=${pageLimit}${q}`);

  let items = data.items || [];

  if (statusFilter) {
    items = items.filter(j => j.status === statusFilter);
  }

  document.getElementById("tbody").innerHTML = items.length
    ? items.map(j => `
<tr>
<td><strong>${j.title}</strong></td>
<td>${j.location}</td>
<td>${arJobType(j.type)}</td>
<td><span class="badge ${statusBadgeClass(j.status)}">${arStatus(j.status)}</span></td>
<td>${shorten(j.description)}</td>
<td class="d-flex gap-1">
<button class="btn btn-sm btn-outline-primary" onclick="toggleStatus('${j.id}','${j.status}')">
${j.status === "OPEN" ? "إغلاق" : "فتح"}
</button>
<button class="btn btn-sm btn-outline-danger" onclick="deleteJob('${j.id}')">حذف</button>
</td>
</tr>
`).join("")
    : `<tr><td colspan="6" class="text-center">لا يوجد وظائف</td></tr>`;
}

document.getElementById("searchInput").oninput = function () {
  clearTimeout(timer);
  timer = setTimeout(() => {
    searchQuery = this.value;
    loadJobs();
  }, 300);
};

document.getElementById("statusFilter").onchange = function () {
  statusFilter = this.value;
  loadJobs();
};

loadJobs();
</script>

</body>
</html>
