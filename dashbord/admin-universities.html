<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>إدارة الجامعات | TalentHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="admin-shared.css">
<link rel="stylesheet" href="admin-universities.css">
</head>
<body>
<div id="toast-container"></div>
<nav class="navbar navbar-expand-lg custom-navbar">
<div class="container">
  <a class="navbar-brand logo" href="dashbord.html">TalentHub</a>
  <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#menu"><span class="navbar-toggler-icon"></span></button>
  <div class="collapse navbar-collapse" id="menu">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="dashbord.html">لوحة التحكم</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-students.html">الطلاب</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-companies.html">الشركات</a></li>
      <li class="nav-item"><a class="nav-link active" href="admin-universities.html">الجامعات</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-jobs.html">الوظائف</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-skills.html">المهارات</a></li>
      <li class="nav-item ms-3"><button class="btn btn-danger btn-sm" onclick="logout()">تسجيل الخروج</button></li>
    </ul>
  </div>
</div>
</nav>
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4"><h3>إدارة الجامعات</h3></div>
  <div class="card-clean mb-4">
    <input type="text" id="searchInput" class="form-control" placeholder="ابحث باسم الجامعة...">
  </div>
  <div class="card-clean" id="tableArea">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>اسم الجامعة</th><th>الموقع</th><th>عدد الطلاب</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="5" class="text-center text-muted py-4">جاري التحميل...</td></tr></tbody>
      </table>
    </div>
    <div class="pagination-bar" id="paginationBar"></div>
  </div>
</div>
<script src="api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
if(!requireAdmin()) throw new Error("redirect");
let currentPage=1; const limit=10; let searchQuery=""; let searchTimer;
function statusBadge(s){return s==="ACTIVE"?"bg-success":s==="PENDING"?"bg-warning text-dark":"bg-secondary";}
function renderTable(items){
  const tbody=document.getElementById("tbody");
  if(!items||items.length===0){tbody.innerHTML='<tr><td colspan="5" class="text-center text-muted py-4">لا توجد جامعات.</td></tr>';return;}
  tbody.innerHTML=items.map(u=>`<tr>
    <td>${u.name}</td>
    <td>${u.location}</td>
    <td>${u.studentsCount ?? (u.students ? u.students.length : 0)}</td>
    <td><span class="badge ${statusBadge(u.status)}">${arStatus(u.status)}</span></td>
    <td>
      <button class="btn btn-sm btn-outline-success me-1" onclick="approveUni('${u.id}')">اعتماد</button>
      <button class="btn btn-sm btn-outline-danger" onclick="deleteUni('${u.id}')">حذف</button>
    </td>
  </tr>`).join("");
}
function renderPagination(p){
  const bar=document.getElementById("paginationBar");
  if(!p||p.totalPages<=1){bar.innerHTML="";return;}
  bar.innerHTML=`<span>صفحة ${p.page} من ${p.totalPages} (${p.total})</span>
    <button class="btn btn-sm btn-outline-secondary ms-2" onclick="changePage(${p.page-1})" ${p.page<=1?"disabled":""}>السابق</button>
    <button class="btn btn-sm btn-outline-secondary" onclick="changePage(${p.page+1})" ${p.page>=p.totalPages?"disabled":""}>التالي</button>`;
}
function changePage(page){if(page<1)return;currentPage=page;loadData();}
async function loadData(){
  const area=document.getElementById("tableArea");area.classList.add("table-loading");
  try{
    const q=searchQuery?"&q="+encodeURIComponent(searchQuery):"";
    const d=await apiFetch("/universities?page="+currentPage+"&limit="+limit+q);
    renderTable(d.items);renderPagination(d.pagination);
  }catch(err){showToast(err.message||"فشل التحميل","error");}
  finally{area.classList.remove("table-loading");}
}
async function approveUni(id){
  try{
    await apiFetch("/universities/"+id,{method:"PUT",body:JSON.stringify({status:"ACTIVE"})});
    showToast("تم اعتماد الجامعة","success");loadData();
  }catch(err){showToast(err.message||"فشل التنفيذ","error");}
}
async function deleteUni(id){
  if(!confirm("هل تريد حذف هذه الجامعة؟"))return;
  try{
    await apiFetch("/universities/"+id,{method:"DELETE"});
    showToast("تم حذف الجامعة","success");loadData();
  }catch(err){showToast(err.message||"فشل الحذف","error");}
}
document.getElementById("searchInput").addEventListener("input",function(){
  clearTimeout(searchTimer);searchTimer=setTimeout(()=>{searchQuery=this.value.trim();currentPage=1;loadData();},400);
});
loadData();
</script>
<script src="../ui-controls.js"></script>
</body>
</html>
