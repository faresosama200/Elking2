<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TalentHub Smoke Test</title>
<style>
:root {
  --bg: #f7f9fc;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --ok: #0f766e;
  --fail: #b91c1c;
  --pending: #92400e;
  --border: #e5e7eb;
}
body {
  margin: 0;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: radial-gradient(circle at top right, #dbeafe, transparent 45%), var(--bg);
  color: var(--text);
}
.container {
  max-width: 920px;
  margin: 30px auto;
  padding: 0 16px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
  padding: 18px;
  margin-bottom: 14px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}
label {
  display: block;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
}
input {
  width: 100%;
  box-sizing: border-box;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-size: 14px;
}
button {
  border: 0;
  border-radius: 10px;
  padding: 10px 14px;
  background: #0f172a;
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}
button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}
.hint {
  font-size: 13px;
  color: var(--muted);
}
#summary {
  font-weight: 700;
}
.pass { color: var(--ok); }
.fail { color: var(--fail); }
.pending { color: var(--pending); }
.result-row {
  border-top: 1px dashed var(--border);
  padding: 10px 0;
}
.result-row:first-child {
  border-top: 0;
}
.code {
  direction: ltr;
  text-align: left;
  font-family: Consolas, monospace;
  background: #f8fafc;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  overflow-x: auto;
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2 style="margin-top:0">Smoke Test تلقائي للـ API</h2>
    <p class="hint">يشغّل فحوصات سريعة بدون تعديل بيانات الإنتاج: health، صلاحيات بدون توكن، تسجيل دخول، وقراءة endpoints الأساسية.</p>

    <div class="grid">
      <div>
        <label for="apiBase">API Base</label>
        <input id="apiBase" value="http://localhost:8080/php-api/index.php">
      </div>
      <div>
        <label for="adminEmail">Admin Email</label>
        <input id="adminEmail" value="admin@talenthub.local">
      </div>
      <div>
        <label for="adminPassword">Admin Password</label>
        <input id="adminPassword" type="password" value="Admin1234">
      </div>
    </div>

    <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
      <button id="runBtn" onclick="runSmoke()">تشغيل الفحص</button>
      <a href="dashbord/test-api.html" style="align-self:center; color:#0f172a;">فتح صفحة test-api الحالية</a>
    </div>
  </div>

  <div class="card">
    <div id="summary" class="pending">لم يتم التشغيل بعد.</div>
    <div id="results"></div>
  </div>
</div>

<script>
function addResult(name, status, details) {
  const results = document.getElementById("results");
  const row = document.createElement("div");
  row.className = "result-row";
  const cls = status === "PASS" ? "pass" : status === "FAIL" ? "fail" : "pending";
  row.innerHTML = "<div><strong>" + name + "</strong> - <span class='" + cls + "'>" + status + "</span></div>"
    + (details ? "<div class='code'>" + details.replace(/</g, "&lt;") + "</div>" : "");
  results.appendChild(row);
}

async function callJson(url, options) {
  const response = await fetch(url, options);
  let data = null;
  try { data = await response.json(); } catch (_) { data = null; }
  return { response, data };
}

async function runSmoke() {
  const runBtn = document.getElementById("runBtn");
  runBtn.disabled = true;

  const summary = document.getElementById("summary");
  const results = document.getElementById("results");
  results.innerHTML = "";
  summary.className = "pending";
  summary.textContent = "جاري التشغيل...";

  const base = document.getElementById("apiBase").value.trim().replace(/\/$/, "");
  const email = document.getElementById("adminEmail").value.trim();
  const password = document.getElementById("adminPassword").value;

  const checks = [];
  let passCount = 0;

  async function runCheck(name, fn) {
    try {
      const out = await fn();
      checks.push({ name, status: "PASS", details: out || "" });
      passCount += 1;
    } catch (err) {
      checks.push({ name, status: "FAIL", details: err && err.message ? err.message : String(err) });
    }
  }

  let token = "";

  await runCheck("Health endpoint", async function () {
    const { response, data } = await callJson(base + "/health", { method: "GET" });
    if (!response.ok || !data || data.status !== "ok") throw new Error("Health failed: HTTP " + response.status);
    return JSON.stringify(data);
  });

  await runCheck("Unauthorized guard on /jobs", async function () {
    const { response } = await callJson(base + "/jobs?page=1&limit=1", { method: "GET" });
    if (response.status !== 401) throw new Error("Expected 401 but got " + response.status);
    return "HTTP " + response.status;
  });

  await runCheck("Admin login", async function () {
    const { response, data } = await callJson(base + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, password: password })
    });
    if (!response.ok || !data || !data.accessToken) {
      throw new Error("Login failed: HTTP " + response.status + " " + JSON.stringify(data || {}));
    }
    token = data.accessToken;
    return "Role=" + (data.user && data.user.role ? data.user.role : "?");
  });

  await runCheck("/dashboard with token", async function () {
    const { response, data } = await callJson(base + "/dashboard", {
      method: "GET",
      headers: { Authorization: "Bearer " + token }
    });
    if (!response.ok || !data || !data.stats) throw new Error("Dashboard failed: HTTP " + response.status);
    return JSON.stringify(data.stats);
  });

  await runCheck("/applications list (admin)", async function () {
    const { response, data } = await callJson(base + "/applications?page=1&limit=3", {
      method: "GET",
      headers: { Authorization: "Bearer " + token }
    });
    if (!response.ok || !data || !Array.isArray(data.items)) throw new Error("Applications failed: HTTP " + response.status);
    return "items=" + data.items.length;
  });

  await runCheck("/students list (admin)", async function () {
    const { response, data } = await callJson(base + "/students?page=1&limit=3", {
      method: "GET",
      headers: { Authorization: "Bearer " + token }
    });
    if (!response.ok || !data || !Array.isArray(data.items)) throw new Error("Students failed: HTTP " + response.status);
    return "items=" + data.items.length;
  });

  checks.forEach(function (c) {
    addResult(c.name, c.status, c.details);
  });

  if (passCount === checks.length) {
    summary.className = "pass";
    summary.textContent = "SUCCESS: " + passCount + "/" + checks.length + " tests passed";
  } else {
    summary.className = "fail";
    summary.textContent = "FAILED: " + passCount + "/" + checks.length + " tests passed";
  }

  runBtn.disabled = false;
}
</script>
</body>
</html>
